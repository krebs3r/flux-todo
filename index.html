<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flux">
  <meta name="application-name" content="Flux">
  <meta name="msapplication-TileColor" content="#3d5afe">
  <meta name="theme-color" content="#c8d6e5" id="theme-color-meta">

  <meta property="og:title" content="Flux — Your Todo App">
  <meta property="og:description" content="A lightweight, browser-only todo app with glassmorphism design. No server. No dependencies. Just static files.">
  <meta property="og:image" content="https://flux-todo.eu/og-image.png">
  <meta property="og:url" content="https://flux-todo.eu">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Flux — Your Todo App">
  <meta name="twitter:description" content="A lightweight, browser-only todo app with glassmorphism design. No server. No dependencies.">
  <meta name="twitter:image" content="https://flux-todo.eu/og-image.png">
  <meta name="description" content="A lightweight, browser-only todo app with glassmorphism design. No server. No dependencies. Just static files.">
  <title>Flux — Deine ToDo App</title>
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="pull-indicator" id="pull-indicator">
    <div class="pull-spinner">
      <svg class="pull-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <polyline points="19 12 12 19 5 12"></polyline>
      </svg>
    </div>
  </div>
  <div class="app">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-icon">
          <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
            <polyline points="7,16 13,22 25,10" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1 id="app-title">Flux — Deine ToDo App</h1>
          <div class="header-claim" id="app-claim"></div>
          <div class="header-badges" id="header-badges"></div>
        </div>
      </div>
      <div class="header-controls">
        <button class="ctrl-btn" id="lang-btn" onclick="toggleLang()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span id="lang-label">EN</span>
        </button>
        <div class="theme-picker-wrap" id="theme-picker-wrap">
          <button class="ctrl-btn" id="theme-btn" onclick="toggleThemePicker()" title="Theme">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
          </button>
          <div class="theme-popover" id="theme-popover"></div>
        </div>
        <button class="ctrl-btn" id="dark-btn" onclick="toggleDark()" aria-label="Toggle dark mode">
          <span id="dark-icon"></span>
        </button>
        <button class="ctrl-btn" id="notify-btn" onclick="toggleNotify()" title="Notifications">
          <span id="notify-icon"></span>
        </button>
      </div>
    </div>

    <!-- Tab: New -->
    <div class="tab-panel" id="panel-new">
      <div class="card">
        <div class="section-header">
          <span class="section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
          <span class="section-title" id="add-title"></span>
        </div>
        <input type="text" class="hero-input" id="new-todo-input" maxlength="200" onkeydown="handleKey(event)" aria-labelledby="add-title" title="Neue Aufgabe" />
        <div class="details-toggle-wrap">
          <button class="details-toggle" id="new-options-toggle" onclick="toggleNewAdvanced()" aria-label="Mehr Optionen" title="Mehr Optionen">
            <svg class="details-chevron" id="new-options-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            <span id="new-options-toggle-label"></span>
          </button>
        </div>
        <div class="new-advanced" id="new-advanced" style="display:none">
          <div class="new-group-title" id="new-group-plan-label"></div>
          <div class="prio-chips" id="prio-chips">
            <button class="prio-chip" data-p="high" onclick="setPriority('high')" aria-label="Hohe Priorität" title="Hohe Priorität"></button>
            <button class="prio-chip" data-p="medium" onclick="setPriority('medium')" aria-label="Mittlere Priorität" title="Mittlere Priorität"></button>
            <button class="prio-chip" data-p="low" onclick="setPriority('low')" aria-label="Niedrige Priorität" title="Niedrige Priorität"></button>
          </div>
          <div class="color-picker-row" id="new-color-picker"></div>
          <div class="form-grid">
            <div class="form-field-wrap">
              <input class="form-field" type="date" id="new-todo-due" aria-labelledby="new-todo-due-label" title="Datum" />
              <span class="form-field-label" id="new-todo-due-label"></span>
            </div>
            <div class="form-field-wrap">
              <input class="form-field" type="time" id="new-todo-time" aria-labelledby="new-todo-time-label" title="Uhrzeit" />
              <span class="form-field-label" id="new-todo-time-label"></span>
            </div>
            <div id="new-todo-recur-wrap">
              <button type="button" class="sort-select recur-dd-btn" id="new-todo-recur-btn" onclick="toggleRecurDD('new-todo-recur')" aria-label="Wiederholung wählen" title="Wiederholung wählen">
                <span id="new-todo-recur-label"></span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="sort-ac recur-dd-ac" id="new-todo-recur-ac"></div>
            </div>
            <div id="new-todo-recur-detail-wrap" style="display:none">
              <button type="button" class="sort-select recur-dd-btn" id="new-todo-recur-detail-btn" onclick="toggleRecurDD('new-todo-recur-detail')" aria-label="Wiederholungsdetail wählen" title="Wiederholungsdetail wählen">
                <span id="new-todo-recur-detail-label"></span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="sort-ac recur-dd-ac" id="new-todo-recur-detail-ac"></div>
            </div>
            <select id="new-todo-recur" style="display:none" aria-label="Wiederholung"></select>
            <select id="new-todo-recur-detail" style="display:none" aria-label="Wiederholungsdetail"></select>
          </div>
          <div class="new-group-title" id="new-group-details-label"></div>
          <div class="form-details" id="form-details">
            <textarea class="note-input" id="new-todo-note" rows="2" aria-label="Notiz" title="Notiz"></textarea>
            <div class="note-md-help" id="new-note-md-help"></div>
            <div class="note-preview-toolbar">
              <button type="button" class="note-preview-toggle" id="new-note-preview-toggle" onclick="toggleNewNotePreview()" aria-label="Markdown-Vorschau" title="Markdown-Vorschau"></button>
            </div>
            <div class="note-preview" id="new-note-preview" style="display:none"></div>
            <div class="cat-input-wrap">
              <input class="cat-input" type="text" id="new-todo-cat" maxlength="100" autocomplete="off" oninput="updateTagCounter('new-todo-cat','tag-counter')" aria-label="Tags" title="Tags" />
              <span class="tag-counter" id="tag-counter"></span>
              <div class="cat-ac" id="cat-ac"></div>
            </div>
          </div>
          <div class="new-group-title" id="new-group-templates-label"></div>
          <div class="io-row" style="margin-top:8px">
            <button class="io-btn" id="new-template-save-btn" onclick="createTemplateFromForm()" aria-label="Als Vorlage speichern" title="Als Vorlage speichern"><span id="new-template-save-label"></span></button>
            <button class="io-btn" id="new-template-use-btn" onclick="openTemplatePicker()" aria-label="Vorlage laden" title="Vorlage laden"><span id="new-template-use-label"></span></button>
            <button class="io-btn" id="new-template-update-btn" onclick="updateEditingTemplateFromForm()" style="display:none" aria-label="Vorlage aktualisieren" title="Vorlage aktualisieren"><span id="new-template-update-label"></span></button>
            <button class="io-btn danger" id="new-template-cancel-btn" onclick="cancelTemplateEdit()" style="display:none" aria-label="Bearbeiten abbrechen" title="Bearbeiten abbrechen"><span id="new-template-cancel-label"></span></button>
          </div>
        </div>
        <button class="btn-add" id="add-btn" onclick="addTodo()" title="Hinzufügen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span id="add-btn-label"></span>
        </button>
        <div class="empty-state empty-state-compact" id="tip-box" style="margin-top:8px">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
          <p class="empty-title" id="tip-label"></p>
          <p class="empty-sub" id="tip-text"></p>
        </div>
      </div>
    </div>

    <!-- Tab: Tasks -->
    <div class="tab-panel active" id="panel-tasks">
      <div class="card">
        <div class="section-header">
          <span class="section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
          <span class="section-title" id="tasks-title"></span>
        </div>
        <div class="board-section">
          <div class="board-bar-label" id="board-bar-label"></div>
          <div class="board-bar" id="board-bar">
            <div id="board-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
            <button class="io-btn" id="board-add-btn" onclick="addBoard()" type="button" aria-label="Add board" title="Add board">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              <span id="board-add-label"></span>
            </button>
          </div>
        </div>
        <div class="filters" id="view-toggle" style="margin-bottom:12px">
          <button class="filter-btn active" id="view-btn-tasks" onclick="switchTasksView('tasks')" aria-label="Tasks view"></button>
          <button class="filter-btn" id="view-btn-notes" onclick="switchTasksView('notes')" aria-label="Notes view"></button>
          <button class="filter-btn" id="view-btn-calendar" onclick="switchTasksView('calendar')" aria-label="Calendar view"></button>
        </div>

        <!-- Tasks view -->
        <div id="tasks-view-wrap">
        <div class="search-wrap">
          <span class="search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input class="search-input" id="search-input" type="text" autocomplete="off" oninput="onSearch(this.value)" aria-label="Search tasks" />
          <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
        </div>
        <div style="display:flex;gap:6px">
          <button class="focus-trigger" id="focus-mode-btn" onclick="enterFocusMode()" aria-label="Focus Mode">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
            <span id="focus-mode-btn-label"></span>
          </button>
        </div>
        <div class="filter-sort-row">
          <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="open" onclick="setFilter('open')" aria-label="Open tasks"></button>
            <button class="filter-btn" data-filter="done" onclick="setFilter('done')" aria-label="Done tasks"></button>
          </div>
          <div class="sort-row">
            <label class="sort-label" id="sort-label"></label>
            <div class="sort-dropdown" id="sort-dropdown">
              <button class="sort-select" id="sort-btn" onclick="toggleSortDropdown()" type="button" title="Sort">
                <span id="sort-btn-label"></span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="sort-ac" id="sort-ac">
                <div class="cat-ac-item" data-sort="manual" onclick="pickSort('manual')"></div>
                <div class="cat-ac-item" data-sort="priority" onclick="pickSort('priority')"></div>
                <div class="cat-ac-item" data-sort="dueDate" onclick="pickSort('dueDate')"></div>
                <div class="cat-ac-item" data-sort="created" onclick="pickSort('created')"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="filter-sort-row" id="cat-filter-row" style="margin-top:-2px">
          <div class="cat-filter-wrap">
            <button type="button" class="sort-select recur-dd-btn" id="cat-filter-btn" title="Tag-Filter" onclick="toggleCatFilterDD()">
              <span id="cat-filter-label"></span>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="sort-ac recur-dd-ac" id="cat-filter-ac"></div>
          </div>
          <select id="cat-filter" style="display:none"></select>
        </div>
        <div id="calendar-container" style="display:none">
          <div class="calendar-nav">
            <button class="calendar-nav-btn" onclick="calendarPrev()">‹</button>
            <span class="calendar-month-label" id="calendar-month-label"></span>
            <button class="calendar-nav-btn" onclick="calendarNext()">›</button>
            <button class="calendar-today-btn" onclick="calendarGoToday()" id="calendar-today-btn"></button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
        <div class="todo-list" id="todo-list"></div>
        <div id="stats-row"></div>
        </div><!-- /tasks-view-wrap -->

        <!-- Notes view -->
        <div id="notes-view-wrap" style="display:none">
          <div class="notes-compose">
            <textarea class="notes-compose-input" id="notes-compose-input" rows="4" autocomplete="off"></textarea>
            <div class="note-md-help" id="notes-compose-md-help"></div>
            <div class="notes-compose-actions">
              <button class="note-preview-toggle" id="notes-compose-preview-toggle" onclick="toggleNotesComposePreview()" type="button"></button>
              <button class="note-save-btn" onclick="addNote()" type="button" id="notes-add-btn"></button>
            </div>
            <div class="note-preview-box" id="notes-compose-preview" style="display:none"></div>
          </div>
          <div id="notes-list"></div>
        </div>

      </div>
    </div>

    <!-- Tab: History -->
    <div class="tab-panel" id="panel-history">
      <div class="card">
        <div class="section-header">
          <span class="section-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/>
            </svg>
          </span>
          <span class="section-title" id="history-title"></span>
        </div>
        <button type="button" class="scheduled-header archive-log-toggle" id="stats-section-toggle" onclick="toggleArchiveSection('stats')" aria-label="Statistiken umschalten" title="Statistiken umschalten"></button>
        <div class="collapsible open" id="stats-collapsible">
          <div class="collapsible-inner">
            <div id="stats-inline-body"></div>
          </div>
        </div>
        <button type="button" class="scheduled-header archive-log-toggle" id="heatmap-section-toggle" onclick="toggleArchiveSection('heatmap')" aria-label="Heatmap umschalten" title="Heatmap umschalten"></button>
        <div class="collapsible open" id="heatmap-collapsible">
          <div class="collapsible-inner">
            <div id="heatmap-body"></div>
          </div>
        </div>
        <button type="button" class="scheduled-header archive-log-toggle" id="archive-section-toggle" onclick="toggleArchiveSection('archive')" aria-label="Archiv umschalten" title="Archiv umschalten"></button>
        <div class="collapsible open" id="archive-collapsible">
          <div class="collapsible-inner">
            <div id="archive-list"></div>
          </div>
        </div>
        <button type="button" class="scheduled-header archive-log-toggle" id="log-section-toggle" onclick="toggleArchiveSection('log')" aria-label="Verlauf umschalten" title="Verlauf umschalten"></button>
        <div class="collapsible" id="log-collapsible">
          <div class="collapsible-inner">
            <div class="history-list" id="history-list"></div>
            <div id="history-usage"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab: Help -->
    <div class="tab-panel" id="panel-help">
      <div class="card">
        <div class="section-header">
          <span class="section-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </span>
          <span class="section-title" id="help-title"></span>
        </div>
        <div class="help-intro" id="help-intro"></div>
      </div>
      <div class="card" style="margin-top:12px" id="help-manual-box"></div>
      <div class="card" style="margin-top:12px">
        <div class="help-toc" id="help-toc"></div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="help-grid" id="help-sections"></div>
      </div>
    </div>

    <!-- Tab: Manage -->
    <div class="tab-panel" id="panel-manage">
      <div class="card">
        <div class="section-header" id="io-header">
          <span class="section-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
            </svg>
          </span>
          <span class="section-title" id="io-title"></span>
        </div>
        <div id="export-reminder-banner" style="display:none">
          <div class="export-reminder-banner">
            <span class="export-reminder-banner-text" id="export-reminder-banner-text"></span>
            <button type="button" class="export-reminder-banner-btn" id="export-reminder-banner-btn" onclick="exportData()"></button>
          </div>
        </div>
        <div class="io-row">
          <button class="io-btn" id="export-btn" onclick="exportData()" aria-label="JSON exportieren" title="JSON exportieren">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <span id="export-label"></span>
          </button>
