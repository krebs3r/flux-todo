  <title>Flux — Deine ToDo App</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%233d5afe'/%3E%3Cpolyline points='7,16 13,22 25,10' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: linear-gradient(135deg, #7eb3ff 0%, #c87eff 35%, #ff7ec8 65%, #7eb3ff 100%);
      --bg-dark: linear-gradient(135deg, #0e1a5e 0%, #2d0a5e 35%, #5e0a3a 65%, #0a1a5e 100%);
      --surface: #ffffff;
      --surface-dark: #13172a;
      --text: #0f1623;
      --text-dark: #e8eaf6;
      --muted: #5a6480;
      --muted-dark: #9baad0;
      --accent: #3d5afe;
      --accent-hover: #2a47e6;
      --accent-muted: rgba(61,90,254,0.12);
      --accent-muted-dark: rgba(61,90,254,0.22);
      --danger: #e53935;
      --danger-muted: rgba(229,57,53,0.10);
      /* Glass tokens */
      --gl:            rgba(255,255,255,0.22);
      --gl-dark:       rgba(12,16,52,0.50);
      --gl-strong:     rgba(255,255,255,0.32);
      --gl-strong-dark:rgba(255,255,255,0.09);
      --gl-subtle:     rgba(255,255,255,0.12);
      --gl-subtle-dark:rgba(255,255,255,0.05);
      --gl-border:     rgba(255,255,255,0.50);
      --gl-border-dark:rgba(255,255,255,0.10);
      --gl-shadow:     0 8px 32px rgba(100,80,200,0.20), 0 1px 0 rgba(255,255,255,0.60) inset;
      --gl-shadow-dark:0 8px 32px rgba(0,0,0,0.50),     0 1px 0 rgba(255,255,255,0.06) inset;
      --shadow-sm: 0 2px 8px rgba(100,80,200,0.12);
      --shadow: var(--gl-shadow);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html {
      min-height: 100%;
      background-color: #7eb3ff;
      background-image: var(--bg);
      background-size: cover;
      background-attachment: fixed;
      transition: background-color 0.5s, background-image 0.5s;
    }
    html.dark {
      background-color: #0e1a5e;
      background-image: var(--bg-dark);
      background-size: cover;
    }

    /* ── Theme presets ───────────────────────────────────────── */
    html.theme-ocean { background-color: #48cae4; --bg: linear-gradient(135deg, #48cae4 0%, #00b4d8 35%, #90e0ef 65%, #48cae4 100%); }
    html.dark.theme-ocean { background-color: #03045e; --bg-dark: linear-gradient(135deg, #03045e 0%, #023e8a 35%, #0077b6 65%, #03045e 100%); }
    html.theme-sunset { background-color: #ffd166; --bg: linear-gradient(135deg, #ffd166 0%, #ef8c5c 35%, #f4845f 65%, #ffd166 100%); }
    html.dark.theme-sunset { background-color: #6e2c00; --bg-dark: linear-gradient(135deg, #6e2c00 0%, #3d0c02 35%, #8b3100 65%, #6e2c00 100%); }
    html.theme-forest { background-color: #74c69d; --bg: linear-gradient(135deg, #74c69d 0%, #52b788 35%, #95d5b2 65%, #74c69d 100%); }
    html.dark.theme-forest { background-color: #1b4332; --bg-dark: linear-gradient(135deg, #1b4332 0%, #081c15 35%, #2d6a4f 65%, #1b4332 100%); }
    html.theme-rose { background-color: #ffb3c6; --bg: linear-gradient(135deg, #ffb3c6 0%, #ff85a1 35%, #fbb1bd 65%, #ffb3c6 100%); }
    html.dark.theme-rose { background-color: #6e1c35; --bg-dark: linear-gradient(135deg, #6e1c35 0%, #3a0c1a 35%, #8e1f45 65%, #6e1c35 100%); }
    html.theme-mono { background-color: #c5c9d0; --bg: linear-gradient(135deg, #d1d5db 0%, #9ca3af 35%, #e5e7eb 65%, #d1d5db 100%); }
    html.dark.theme-mono { background-color: #111827; --bg-dark: linear-gradient(135deg, #1f2937 0%, #111827 35%, #374151 65%, #1f2937 100%); }
    html.theme-bender { background-color: #b8c8e0; --bg: linear-gradient(135deg, #b8c8e0 0%, #8fa5c8 35%, #c8d5e8 65%, #b8c8e0 100%); }
    html.dark.theme-bender { background-color: #131d2e; --bg-dark: linear-gradient(135deg, #131d2e 0%, #0d1520 35%, #1a2440 65%, #131d2e 100%); }
    html.theme-lumpi { background-color: #e2d0b8; --bg: linear-gradient(135deg, #e2d0b8 0%, #c8b090 35%, #ead8c0 65%, #e2d0b8 100%); }
    html.dark.theme-lumpi { background-color: #221610; --bg-dark: linear-gradient(135deg, #221610 0%, #160e08 35%, #2c1e12 65%, #221610 100%); }
    html.theme-nobler { background-color: #d0d0d8; --bg: linear-gradient(135deg, #d0d0d8 0%, #b0b0bc 35%, #dcdce4 65%, #d0d0d8 100%); }
    html.dark.theme-nobler { background-color: #14141c; --bg-dark: linear-gradient(135deg, #14141c 0%, #0c0c12 35%, #1c1c26 65%, #14141c 100%); }

    /* ── Theme Picker ────────────────────────────────────────── */
    .theme-picker-wrap { position: relative; }
    .theme-popover {
      display: none;
      position: absolute; right: 0; top: calc(100% + 8px);
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid var(--gl-border); border-radius: var(--radius);
      box-shadow: var(--gl-shadow); padding: 10px; min-width: 196px;
      z-index: 100;
    }
    .theme-popover.open { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    body.dark .theme-popover { background: rgba(12,16,52,0.88); border-color: var(--gl-border-dark); box-shadow: var(--gl-shadow-dark); }
    .theme-swatch {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 6px 4px; border-radius: 8px; border: none; background: transparent;
      transition: background 0.15s;
    }
    .theme-swatch:hover { background: rgba(255,255,255,0.40); }
    body.dark .theme-swatch:hover { background: rgba(255,255,255,0.09); }
    .theme-swatch.active { background: var(--accent-muted); outline: 2px solid var(--accent); outline-offset: 1px; }
    body.dark .theme-swatch.active { background: var(--accent-muted-dark); }
    .swatch-circle { width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); flex-shrink: 0; }
    .swatch-label { font-size: 10px; font-weight: 600; color: var(--text); opacity: 0.8; white-space: nowrap; }
    body.dark .swatch-label { color: var(--text-dark); }

    body {
      font-family: -apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      background: transparent;
      padding: 32px 16px 64px;
      padding-top: max(32px, calc(env(safe-area-inset-top) + 16px));
      padding-bottom: max(64px, calc(env(safe-area-inset-bottom) + 32px));
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 660px; margin: 0 auto; }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 14px 16px;
      background: var(--gl);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid var(--gl-border);
      border-radius: var(--radius);
      box-shadow: var(--gl-shadow);
      position: relative;
      z-index: 10;
    }
    body.dark .header {
      background: var(--gl-dark);
      border-color: var(--gl-border-dark);
      box-shadow: var(--gl-shadow-dark);
    }
    .header-left {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .header-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.95);
      flex-shrink: 0;
      box-shadow: 0 4px 18px rgba(100,80,200,0.28), 0 1px 0 rgba(255,255,255,0.60) inset;
    }
    body.dark .header-icon {
      background: rgba(100,80,220,0.30);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 4px 18px rgba(0,0,0,0.40), 0 1px 0 rgba(255,255,255,0.12) inset;
    }
    .header h1 {
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      transition: color 0.4s;
      line-height: 1.2;
    }
    body.dark .header h1 { color: var(--text-dark); }
    .header-claim {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.01em;
      margin-top: 1px;
    }
    body.dark .header-claim { color: var(--muted-dark); }
    .header-badges {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .header-badge {
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.50);
      color: var(--muted);
      background: rgba(255,255,255,0.28);
    }
    body.dark .header-badge {
      border-color: rgba(255,255,255,0.12);
      color: var(--muted-dark);
      background: rgba(255,255,255,0.07);
    }

    .header-controls { display: flex; gap: 6px; align-items: center; margin-top: 2px; }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 32px;
      background: var(--gl-strong);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--gl-border);
      color: var(--muted);
      border-radius: var(--radius-sm);
      padding: 0 10px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }
    body.dark .ctrl-btn {
      background: var(--gl-strong-dark);
      border-color: var(--gl-border-dark);
      color: var(--muted-dark);
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.50);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
    }
    body.dark .ctrl-btn:hover {
      background: rgba(255,255,255,0.14);
      box-shadow: 0 0 0 3px var(--accent-muted-dark);
    }
    .ctrl-btn svg { flex-shrink: 0; }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: var(--gl);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--gl-border);
      border-radius: var(--radius);
      box-shadow: var(--gl-shadow);
      padding: 20px 24px;
      margin-bottom: 12px;
    }
    body.dark .card {
      background: var(--gl-dark);
      border-color: var(--gl-border-dark);
      box-shadow: var(--gl-shadow-dark);
    }

    /* ── Add Row ────────────────────────────────────────────── */
    .add-row { display: flex; gap: 8px; }

    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .add-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
      background: rgba(255,255,255,0.42);
    }
    body.dark .add-row input {
      background: rgba(255,255,255,0.07);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
    }
    body.dark .add-row input:focus { background: rgba(255,255,255,0.11); }
    .add-row input::placeholder { color: var(--muted); }
    body.dark .add-row input::placeholder { color: var(--muted-dark); }

    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: rgba(61,90,254,0.35);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.50);
      border-radius: var(--radius-sm);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(61,90,254,0.30), 0 1px 0 rgba(255,255,255,0.55) inset;
    }
    .btn-add:hover {
      background: rgba(61,90,254,0.50);
      box-shadow: 0 6px 22px rgba(61,90,254,0.40), 0 1px 0 rgba(255,255,255,0.55) inset;
    }
    .btn-add:active { transform: scale(0.95); }
    body.dark .btn-add {
      background: rgba(100,80,220,0.35);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 4px 18px rgba(0,0,0,0.40), 0 1px 0 rgba(255,255,255,0.12) inset;
    }
    body.dark .btn-add:hover {
      background: rgba(100,80,220,0.50);
      box-shadow: 0 6px 22px rgba(0,0,0,0.50), 0 1px 0 rgba(255,255,255,0.15) inset;
    }

    /* ── Priority ───────────────────────────────────────────── */
    .priority-cycle-btn {
      height: 40px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      letter-spacing: 0.04em;
      white-space: nowrap;
      min-width: 74px;
    }
    body.dark .priority-cycle-btn {
      background: rgba(255,255,255,0.07);
      border-color: var(--gl-border-dark);
      color: var(--muted-dark);
    }
    .priority-cycle-btn[data-p="high"]   { background: rgba(229,57,53,0.12); border-color: rgba(229,57,53,0.40); color: #e53935; }
    .priority-cycle-btn[data-p="medium"] { background: rgba(245,124,0,0.12);  border-color: rgba(245,124,0,0.40);  color: #e65100; }
    .priority-cycle-btn[data-p="low"]    { background: rgba(56,142,60,0.12);  border-color: rgba(56,142,60,0.40);  color: #2e7d32; }
    body.dark .priority-cycle-btn[data-p="high"]   { background: rgba(229,57,53,0.20);  color: #ef5350; }
    body.dark .priority-cycle-btn[data-p="medium"] { background: rgba(245,124,0,0.20);  color: #f57c00; }
    body.dark .priority-cycle-btn[data-p="low"]    { background: rgba(56,142,60,0.20);  color: #66bb6a; }
    .prio-badge {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
      line-height: 1.4;
      transition: opacity 0.15s, filter 0.15s;
    }
    .prio-badge:hover { filter: brightness(0.9); }
    .prio-badge[data-p="high"]   { background: rgba(229,57,53,0.12); border-color: rgba(229,57,53,0.30); color: #c62828; }
    .prio-badge[data-p="medium"] { background: rgba(245,124,0,0.12);  border-color: rgba(245,124,0,0.30);  color: #bf360c; }
    .prio-badge[data-p="low"]    { background: rgba(56,142,60,0.12);  border-color: rgba(56,142,60,0.30);  color: #1b5e20; }
    .prio-badge[data-p=""]       { display: none; }
    .todo-item:hover .prio-badge[data-p=""] { display: inline-block; background: rgba(90,100,128,0.10); border-color: rgba(90,100,128,0.18); color: var(--muted); }
    body.dark .prio-badge[data-p="high"]   { background: rgba(229,57,53,0.20); color: #ef5350; }
    body.dark .prio-badge[data-p="medium"] { background: rgba(245,124,0,0.20); color: #f57c00; }
    body.dark .prio-badge[data-p="low"]    { background: rgba(56,142,60,0.20); color: #66bb6a; }
    body.dark .todo-item:hover .prio-badge[data-p=""] { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); color: var(--muted-dark); }
    .todo-note {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    body.dark .todo-note { color: var(--muted-dark); }
    .note-input {
      width: 100%;
      margin-top: 8px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.20);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      resize: none;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .note-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
      background: rgba(255,255,255,0.35);
    }
    body.dark .note-input {
      background: rgba(255,255,255,0.05);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
    }
    body.dark .note-input:focus { background: rgba(255,255,255,0.09); }
    .note-input::placeholder { color: var(--muted); }
    body.dark .note-input::placeholder { color: var(--muted-dark); }
    .note-edit-input {
      width: 100%;
      margin-top: 4px;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--accent);
      background: rgba(255,255,255,0.45);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      resize: none;
      line-height: 1.5;
      box-shadow: 0 0 0 3px var(--accent-muted);
    }
    body.dark .note-edit-input {
      background: rgba(255,255,255,0.08);
      color: var(--text-dark);
    }

    /* ── Due Date ────────────────────────────────────────────── */
    .due-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .due-input-icon { color: var(--muted); display: flex; flex-shrink: 0; }
    body.dark .due-input-icon { color: var(--muted-dark); }
    .due-input {
      flex: 1;
      padding: 10px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .due-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
    }
    body.dark .due-input {
      background: rgba(255,255,255,0.05);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
      color-scheme: dark;
    }
    .due-input::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
    .todo-due {
      font-size: 0.72rem;
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .todo-due.due-future  { color: var(--muted); }
    .todo-due.due-today   { color: #f57c00; font-weight: 600; }
    .todo-due.due-overdue { color: var(--danger); font-weight: 600; }
    body.dark .todo-due.due-future  { color: var(--muted-dark); }
    body.dark .todo-due.due-today   { color: #ffb74d; }
    .todo-item.overdue { box-shadow: inset 3px 0 0 var(--danger); }
    .due-edit-input {
      width: 100%;
      margin-top: 4px;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--accent);
      background: rgba(255,255,255,0.25);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-muted);
      color-scheme: light;
    }
    body.dark .due-edit-input {
      background: rgba(255,255,255,0.08);
      color: var(--text-dark);
      color-scheme: dark;
    }

    /* ── Search ─────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      display: flex;
    }
    body.dark .search-icon { color: var(--muted-dark); }
    .search-input {
      width: 100%;
      padding: 10px 36px 10px 36px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.30);
      background: var(--gl-subtle);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    body.dark .search-input {
      background: var(--gl-subtle-dark);
      border-color: rgba(255,255,255,0.07);
      color: var(--text-dark);
    }
    .search-input::placeholder { color: var(--muted); }
    body.dark .search-input::placeholder { color: var(--muted-dark); }
    .search-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.28);
    }
    body.dark .search-input:focus {
      background: rgba(255,255,255,0.08);
    }
    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      display: none;
    }
    .search-clear.visible { display: block; }
    .search-clear:hover { color: var(--text); }
    body.dark .search-clear:hover { color: var(--text-dark); }

    /* ── Filters ────────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: var(--gl-subtle);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: var(--radius-sm);
      padding: 3px;
    }
    body.dark .filters {
      background: var(--gl-subtle-dark);
      border-color: rgba(255,255,255,0.07);
    }
    .filter-btn {
      flex: 1;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: all 0.15s;
    }
    body.dark .filter-btn { color: var(--muted-dark); }
    .filter-btn.active {
      background: rgba(255,255,255,0.55);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    body.dark .filter-btn.active {
      background: rgba(255,255,255,0.13);
      color: var(--text-dark);
    }

    /* ── Todo List ──────────────────────────────────────────── */
    .todo-list { display: flex; flex-direction: column; gap: 1px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: var(--radius-sm);
      background: transparent;
      cursor: default;
      transition: background 0.15s;
      user-select: none;
      position: relative;
    }
    .todo-item:hover { background: rgba(255,255,255,0.28); }
    body.dark .todo-item:hover { background: rgba(255,255,255,0.07); }
    .todo-item.dragging { opacity: 0.35; cursor: grabbing; }
    .todo-item.drag-over {
      background: var(--accent-muted);
      outline: 1px solid var(--accent);
      outline-offset: -1px;
      border-radius: var(--radius-sm);
    }
    body.dark .todo-item.drag-over { background: var(--accent-muted-dark); }

    .drag-handle {
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
      cursor: grab;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .todo-item:hover .drag-handle { color: var(--muted); }
    body.dark .drag-handle { color: rgba(255,255,255,0.15); }
    body.dark .todo-item:hover .drag-handle { color: var(--muted-dark); }

    /* Custom checkbox */
    .checkbox-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .checkbox-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .checkbox-box {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    body.dark .checkbox-box { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
    .checkbox-wrap:hover .checkbox-box { border-color: var(--accent); }
    .checkbox-wrap input:checked ~ .checkbox-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkbox-check {
      display: none;
      color: #fff;
    }
    .checkbox-wrap input:checked ~ .checkbox-box .checkbox-check { display: block; }

    .todo-text-wrap { flex: 1; min-width: 0; }
    .todo-text {
      font-size: 0.9rem;
      color: var(--text);
      word-break: break-word;
      line-height: 1.45;
      transition: color 0.2s;
    }
    body.dark .todo-text { color: var(--text-dark); }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    body.dark .todo-item.done .todo-text { color: var(--muted-dark); }

    .todo-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.01em;
    }
    body.dark .todo-meta { color: var(--muted-dark); }

    .todo-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .todo-item:hover .todo-actions { opacity: 1; }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .action-btn:hover { background: rgba(255,255,255,0.42); color: var(--accent); }
    .action-btn.danger:hover { background: var(--danger-muted); color: var(--danger); }
    body.dark .action-btn:hover { background: rgba(255,255,255,0.10); color: var(--accent); }
    body.dark .action-btn.danger:hover { background: rgba(229,57,53,0.15); color: #ef5350; }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.35);
      margin: 8px 0;
    }
    body.dark .divider { background: rgba(255,255,255,0.08); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 32px 0 20px;
      color: var(--muted);
    }
    body.dark .empty-state { color: var(--muted-dark); }
    .empty-state svg { opacity: 0.35; }
    .empty-state p { font-size: 0.88rem; }

    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.35);
    }
    body.dark .stats-row { border-color: rgba(255,255,255,0.08); }
    .stats-text {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    body.dark .stats-text { color: var(--muted-dark); }
    .progress-bar {
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.30);
      border-radius: 2px;
      overflow: hidden;
    }
    body.dark .progress-bar { background: rgba(255,255,255,0.10); }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Section Header ─────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .section-icon {
      color: var(--muted);
      display: flex;
      align-items: center;
    }
    body.dark .section-icon { color: var(--muted-dark); }
    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    body.dark .section-title { color: var(--muted-dark); }

    /* ── History ────────────────────────────────────────────── */
    .history-list { display: flex; flex-direction: column; gap: 1px; }

    .history-item {
      display: grid;
      grid-template-columns: 8px auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }
    .history-item:hover { background: rgba(255,255,255,0.28); }
    body.dark .history-item:hover { background: rgba(255,255,255,0.07); }

    .h-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .h-dot-done    { background: #43a047; }
    .h-dot-created { background: var(--accent); }
    .h-dot-deleted { background: var(--danger); }
    .h-dot-undone  { background: #fb8c00; }

    .h-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
      color: var(--muted);
      min-width: 68px;
    }
    body.dark .h-label { color: var(--muted-dark); }

    .h-text {
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
    }
    body.dark .h-text { color: var(--text-dark); }

    .h-time {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    body.dark .h-time { color: var(--muted-dark); }

    .history-empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 0;
      font-size: 0.85rem;
    }
    body.dark .history-empty { color: var(--muted-dark); }

    /* ── IO Buttons ─────────────────────────────────────────── */
    .io-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .io-btn {
      flex: 1;
      min-width: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.20);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all 0.15s;
    }
    body.dark .io-btn {
      background: rgba(255,255,255,0.06);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
    }
    .io-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.38); }
    body.dark .io-btn:hover { background: rgba(255,255,255,0.11); }
    .io-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-muted); }
    body.dark .io-btn.danger:hover { background: rgba(229,57,53,0.12); border-color: var(--danger); }
    .io-btn svg { flex-shrink: 0; }

    #import-file { display: none; }

    /* ── Inline Edit ────────────────────────────────────────── */
    .todo-edit-input {
      width: 100%;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--accent);
      background: rgba(255,255,255,0.55);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-muted);
    }
    body.dark .todo-edit-input {
      background: rgba(255,255,255,0.10);
      color: var(--text-dark);
    }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(255,255,255,0.30);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.50);
      color: var(--text);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
      white-space: nowrap;
      box-shadow: var(--gl-shadow);
    }
    body.dark .toast {
      background: rgba(12,16,52,0.65);
      border-color: rgba(255,255,255,0.10);
      color: var(--text-dark);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .clear-all-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 2px 0;
      letter-spacing: 0.02em;
      transition: color 0.15s;
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 2px;
    }
    .clear-all-btn:hover {
      color: var(--danger);
      text-decoration-color: var(--danger);
    }
    body.dark .clear-all-btn { color: var(--muted-dark); }
    body.dark .clear-all-btn:hover { color: #ef5350; text-decoration-color: #ef5350; }

    .section-header { cursor: pointer; }
    .section-header:hover .section-title { color: var(--text); }
    body.dark .section-header:hover .section-title { color: var(--text-dark); }
    .chevron {
      margin-left: auto;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: transform 0.22s ease;
    }
    body.dark .chevron { color: var(--muted-dark); }
    .section-header.open .chevron { transform: rotate(180deg); }
    .collapsible {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease;
    }
    .collapsible.open { grid-template-rows: 1fr; }
    .collapsible-inner { overflow: hidden; }

    .footer {
      text-align: center;
      margin-top: 8px;
      padding-bottom: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .footer span {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .footer span:hover {
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.5);
    }
    .footer-github {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }
    .footer-github:hover { color: rgba(255,255,255,0.75); }

    /* ── iOS Install Banner ─────────────────────────────────── */
    .ios-banner {
      position: fixed;
      bottom: max(16px, calc(env(safe-area-inset-bottom) + 12px));
      left: 16px; right: 16px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(61,90,254,0.18), 0 1px 0 rgba(255,255,255,0.7) inset;
      padding: 14px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 3000;
      animation: bannerIn 0.35s cubic-bezier(.22,1,.36,1);
    }
    body.dark .ios-banner {
      background: rgba(12,16,52,0.78);
      border-color: rgba(255,255,255,0.10);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.06) inset;
    }
    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ios-banner-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ios-banner-icon {
      width: 36px; height: 36px;
      background: #3d5afe;
      border-radius: 9px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .ios-banner-icon svg { width: 20px; height: 20px; }
    .ios-banner-text {
      flex: 1;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    body.dark .ios-banner-text { color: var(--text-dark); }
    .ios-banner-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; line-height: 1;
      padding: 4px; border-radius: 50%;
      flex-shrink: 0;
    }
    .ios-banner-close:hover { color: var(--text); }
    body.dark .ios-banner-close:hover { color: var(--text-dark); }
    .ios-banner-hint {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.45;
      padding-left: 46px;
    }
    body.dark .ios-banner-hint { color: var(--muted-dark); }
    .ios-banner-arrow {
      text-align: center;
      font-size: 1.3rem;
      color: #3d5afe;
      line-height: 1;
      margin-top: 2px;
      animation: arrowBounce 1.2s ease-in-out infinite;
    }
    @keyframes arrowBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(4px); }
    }

    /* ── Confirm Modal ──────────────────────────────────────── */
    .confirm-modal { max-width: 360px; }
    .confirm-body { padding: 24px 22px 20px; }
    .confirm-message {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 20px;
    }
    body.dark .confirm-message { color: var(--text-dark); }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .confirm-btn {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.40);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .confirm-no {
      background: rgba(255,255,255,0.25);
      color: var(--text);
    }
    body.dark .confirm-no {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.10);
      color: var(--text-dark);
    }
    .confirm-no:hover { background: rgba(255,255,255,0.42); }
    body.dark .confirm-no:hover { background: rgba(255,255,255,0.12); }
    .confirm-yes {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .confirm-yes:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .confirm-yes.danger {
      background: var(--danger);
      border-color: var(--danger);
    }
    .confirm-yes.danger:hover { background: #c62828; border-color: #c62828; }

    /* ── Changelog Modal ────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.70);
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(100,80,200,0.30), 0 1px 0 rgba(255,255,255,0.60) inset;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(16px) scale(0.98);
      transition: transform 0.22s ease;
    }
    body.dark .modal {
      background: rgba(12,16,52,0.65);
      border-color: rgba(255,255,255,0.10);
      box-shadow: 0 24px 64px rgba(0,0,0,0.60), 0 1px 0 rgba(255,255,255,0.06) inset;
    }
    .modal-backdrop.show .modal { transform: translateY(0) scale(1); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.30);
    }
    body.dark .modal-header { border-color: rgba(255,255,255,0.08); }
    .modal-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    body.dark .modal-header h2 { color: var(--text-dark); }
    .modal-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.38); color: var(--text); }
    body.dark .modal-close:hover { background: rgba(255,255,255,0.10); color: var(--text-dark); }
    .modal-body { padding: 20px 22px 24px; }
    .changelog-version {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .changelog-tag {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--accent-muted);
      color: var(--accent);
    }
    body.dark .changelog-tag { background: var(--accent-muted-dark); }
    .changelog-date {
      font-size: 0.75rem;
      color: var(--muted);
    }
    body.dark .changelog-date { color: var(--muted-dark); }
    .changelog-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .changelog-list li {
      display: flex;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
    }
    body.dark .changelog-list li { color: var(--text-dark); }
    .changelog-list li::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* ── Touch devices: always show actions & handles ───────── */
    @media (hover: none) and (pointer: coarse) {
      /* Actions always visible — no hover on touch */
      .todo-actions { opacity: 1; }
      /* Drag handle always visible */
      .drag-handle { color: rgba(255,255,255,0.45); }
      body.dark .drag-handle { color: rgba(255,255,255,0.25); }
      /* Prio badge always tappable */
      .prio-badge[data-p=""] {
        display: inline-block;
        background: rgba(90,100,128,0.10);
        border-color: rgba(90,100,128,0.18);
        color: var(--muted);
      }
      body.dark .prio-badge[data-p=""] {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.12);
        color: var(--muted-dark);
      }
      /* Active state feedback (replaces hover) */
      .btn-add:active        { transform: scale(0.93); background: rgba(61,90,254,0.55); }
      .ctrl-btn:active       { background: rgba(255,255,255,0.50); color: var(--accent); }
      body.dark .ctrl-btn:active { background: rgba(255,255,255,0.18); }
      .filter-btn:active     { background: rgba(255,255,255,0.40); }
      body.dark .filter-btn:active { background: rgba(255,255,255,0.12); }
      .action-btn:active     { background: rgba(255,255,255,0.42); color: var(--accent); }
      .action-btn.danger:active { background: var(--danger-muted); color: var(--danger); }
      .io-btn:active         { border-color: var(--accent); color: var(--accent); }
      .todo-item:active      { background: rgba(255,255,255,0.22); }
      body.dark .todo-item:active { background: rgba(255,255,255,0.07); }
    }

    /* ── Mobile layout ───────────────────────────────────────── */
    @media (max-width: 640px) {
      body {
        padding: 16px 12px 56px;
        padding-top: max(16px, calc(env(safe-area-inset-top) + 12px));
        padding-bottom: max(56px, calc(env(safe-area-inset-bottom) + 24px));
        padding-left: max(12px, env(safe-area-inset-left));
        padding-right: max(12px, env(safe-area-inset-right));
      }
      .card { padding: 14px 16px; }

      /* Header controls: 44px touch targets */
      .ctrl-btn { height: 44px; padding: 0 13px; }

      /* Add row: 44px buttons */
      .btn-add { width: 44px; height: 44px; }
      .priority-cycle-btn { height: 44px; min-width: 80px; }

      /* Checkbox: larger tap area via padding trick */
      .checkbox-wrap { padding: 11px; margin: -11px; }

      /* Todo items: more breathing room */
      .todo-item { padding: 14px 10px; gap: 10px; }

      /* Action buttons: 44px tap targets */
      .action-btn { width: 44px; height: 44px; }

      /* Filter buttons: 44px min height */
      .filter-btn { padding: 11px 12px; font-size: 0.85rem; }

      /* Search: larger tap area for clear button */
      .search-clear { padding: 10px 8px; right: 2px; font-size: 1rem; }

      /* IO buttons: 44px */
      .io-btn { padding: 13px 14px; }

      /* Section header: larger tap target */
      .section-header { padding: 6px 0; cursor: pointer; }

      /* History items: easier to read */
      .history-item { padding: 12px; }

      .header h1 { font-size: 1.1rem; }
    }
  </style>
</head>

    <!-- History -->

    const t = () => i18n[lang];

    // ── Persistence ──────────────────────────────────────────────────────────
    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
      localStorage.setItem('history', JSON.stringify(history));
      localStorage.setItem('lang', lang);
      localStorage.setItem('dark', dark ? '1' : '0');
      localStorage.setItem('theme', currentTheme);
    }
    function load() {
      try { todos = JSON.parse(localStorage.getItem('todos')) || []; } catch { todos = []; }
      try { history = JSON.parse(localStorage.getItem('history')) || []; } catch { history = []; }
      lang = localStorage.getItem('lang') || 'de';
      dark = localStorage.getItem('dark') === '1';
      currentTheme = localStorage.getItem('theme') || 'flux';
    }

    // ── History helpers ──────────────────────────────────────────────────────
    function addHistory(type, text) {
      history.unshift({ type, text, ts: Date.now() });
      if (history.length > 10000) history.pop();
    }
    function formatDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function formatShortDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    function getDueClass(dueDate) {
      const today = new Date().toISOString().split('T')[0];
      if (dueDate < today) return 'due-overdue';
      if (dueDate === today) return 'due-today';
      return 'due-future';
    }
    function formatDueDate(dueDate) {
      return dueDate; // already YYYY-MM-DD
    }

    // ── CRUD ─────────────────────────────────────────────────────────────────
    function addTodo() {
      const input = document.getElementById('new-todo-input');
      const text = input.value.trim();
      if (!text) return;
      const noteInput = document.getElementById('new-todo-note');
      const dueInput = document.getElementById('new-todo-due');
      todos.unshift({ id: Date.now(), text, done: false, created: Date.now(), priority: newPriority, note: noteInput.value.trim(), dueDate: dueInput.value || '' });
      addHistory('created', text);
      input.value = '';
      noteInput.value = '';
      dueInput.value = '';
      newPriority = '';
      updatePriorityBtn();
      save(); render();
    }
    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      todo.done = !todo.done;
      if (todo.done) { todo.completedAt = Date.now(); addHistory('done', todo.text); }
      else { delete todo.completedAt; addHistory('undone', todo.text); }
      save(); render();
    }
    function deleteTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) addHistory('deleted', todo.text);
      todos = todos.filter(t => t.id !== id);
      save(); render();
    }
    function startEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const wrap = document.querySelector(`[data-id="${id}"] .todo-text-wrap`);
      const oldText = todo.text;
      const oldNote = todo.note || '';
      const oldDue = todo.dueDate || '';
      wrap.innerHTML = `
        <input class="todo-edit-input" value="${escHtml(oldText)}" maxlength="200" />
        <textarea class="note-edit-input" rows="2" maxlength="1000">${escHtml(oldNote)}</textarea>
        <input class="due-edit-input" type="date" value="${oldDue}" />
      `;
      const inp = wrap.querySelector('.todo-edit-input');
      const noteInp = wrap.querySelector('.note-edit-input');
      const dueInp = wrap.querySelector('.due-edit-input');
      noteInp.placeholder = t().notePlaceholder;
      inp.focus(); inp.select();
      inp.onkeydown = e => {
        if (e.key === 'Enter') { e.preventDefault(); noteInp.focus(); }
        if (e.key === 'Escape') commitEdit(id, oldText, oldText, oldNote, oldDue);
      };
      noteInp.onkeydown = e => {
        if (e.key === 'Escape') commitEdit(id, oldText, oldText, oldNote, oldDue);
      };
      const doCommit = (e) => {
        if (!wrap.contains(e.relatedTarget)) {
          wrap.removeEventListener('focusout', doCommit);
          commitEdit(id, inp.value, oldText, noteInp.value, dueInp.value);
        }
      };
      wrap.addEventListener('focusout', doCommit);
    }
    function commitEdit(id, newText, oldText, newNote, newDue) {
      newText = newText.trim();
      if (!newText) { render(); return; }
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const noteValue = newNote !== undefined ? newNote.trim() : (todo.note || '');
      const dueValue = newDue !== undefined ? newDue : (todo.dueDate || '');
      if (newText === oldText && noteValue === (todo.note || '') && dueValue === (todo.dueDate || '')) { render(); return; }
      todo.text = newText;
      todo.note = noteValue;
      todo.dueDate = dueValue;
      save(); render();
    }

    // ── Filter ───────────────────────────────────────────────────────────────
    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === f));
      render();
    }
    function filteredTodos() {
      let result = todos;
      if (currentFilter === 'open') result = result.filter(t => !t.done);
      else if (currentFilter === 'done') result = result.filter(t => t.done);
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        result = result.filter(t =>
          t.text.toLowerCase().includes(q) || (t.note && t.note.toLowerCase().includes(q))
        );
      }
      return result;
    }
    function onSearch(val) {
      searchQuery = val.trim();
      document.getElementById('search-clear').classList.toggle('visible', searchQuery.length > 0);
      render();
    }
    function clearSearch() {
      searchQuery = '';
      const inp = document.getElementById('search-input');
      if (inp) inp.value = '';
      document.getElementById('search-clear').classList.remove('visible');
      render();
    }

    // ── Drag & Drop ──────────────────────────────────────────────────────────
    function onDragStart(e, id) {
      dragSrcIndex = todos.findIndex(t => t.id === id);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => e.target.classList.add('dragging'), 0);
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
    }
    function onDragOver(e, id) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('drag-over');
    }
    function onDrop(e, id) {
      e.preventDefault();
      const targetIndex = todos.findIndex(t => t.id === id);
      if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
      const [moved] = todos.splice(dragSrcIndex, 1);
      todos.splice(targetIndex, 0, moved);
      dragSrcIndex = null;
      save(); render();
    }

    // ── Import / Export ──────────────────────────────────────────────────────
    function exportData() {
      const blob = new Blob([JSON.stringify({ todos, history, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `tasks-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      showToast(t().toastExported);
    }
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data.todos)) throw new Error();
          todos = data.todos; history = data.history || [];
          save(); render(); showToast(t().toastImported);
        } catch { showToast(t().toastInvalidFile); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
    let _confirmCb = null;
    function showConfirm(message, onYes, onNo, yesIsDanger) {
      const T = t();
      document.getElementById('confirm-message').textContent = message;
      document.getElementById('confirm-yes').textContent = T.btnYes;
      document.getElementById('confirm-no').textContent = T.btnNo;
      document.getElementById('confirm-yes').classList.toggle('danger', !!yesIsDanger);
      document.getElementById('confirm-backdrop').classList.add('show');
      _confirmCb = { onYes, onNo };
    }
    function resolveConfirm(answer) {
      document.getElementById('confirm-backdrop').classList.remove('show');
      const cb = _confirmCb; _confirmCb = null;
      if (answer && cb?.onYes) cb.onYes();
      else if (!answer && cb?.onNo) cb.onNo();
    }

    function clearAllTodos() {
      if (!todos.length) return;
      const T = t();
      showConfirm(T.confirmClearAll, () => {
        showConfirm(T.confirmExportFirst, () => {
          exportData();
          doDeleteAll();
        }, () => {
          doDeleteAll();
        });
      }, null, true);
    }
    function doDeleteAll() {
      const T = t();
      todos.forEach(todo => addHistory('deleted', todo.text));
      todos = [];
      save(); render();
      showToast(T.toastAllCleared);
    }

    let historyOpen = false;
    function toggleHistory() {
      historyOpen = !historyOpen;
      document.getElementById('history-header').classList.toggle('open', historyOpen);
      document.getElementById('history-collapsible').classList.toggle('open', historyOpen);
    }

    function clearHistory() {
      if (!confirm(t().confirmClear)) return;
      history = []; save(); render(); showToast(t().toastHistoryCleared);
    }

    // ── Toast ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    // ── Theme / Lang ─────────────────────────────────────────────────────────
    function toggleDark() {
      dark = !dark; applyDark(); save();
    }
    function applyDark() {
      document.body.classList.toggle('dark', dark);
      document.documentElement.classList.toggle('dark', dark);
      document.getElementById('dark-icon').innerHTML = dark ? SVG.sun : SVG.moon;
      const th = THEMES[currentTheme] || THEMES.flux;
      document.getElementById('theme-color-meta').content = dark ? th.dark : th.light;
    }
    function toggleLang() {
      lang = lang === 'de' ? 'en' : 'de';
      document.getElementById('lang-label').textContent = lang === 'de' ? 'DE' : 'EN';
      document.documentElement.lang = lang;
      save(); render();
      const banner = document.getElementById('ios-banner');
      if (banner && banner.style.display !== 'none') {
        const T = t();
        document.getElementById('ios-banner-title').textContent = T.iosBannerTitle;
        document.getElementById('ios-banner-hint').innerHTML = T.iosBannerHint;
      }
    }
    function applyLang() {
      document.getElementById('lang-label').textContent = lang === 'de' ? 'DE' : 'EN';
      document.documentElement.lang = lang;
    }

    // ── Theme Picker ──────────────────────────────────────────────────────────
    function applyTheme(id) {
      currentTheme = id;
      const html = document.documentElement;
      Object.keys(THEMES).forEach(k => html.classList.remove('theme-' + k));
      if (id !== 'flux') html.classList.add('theme-' + id);
      const th = THEMES[id] || THEMES.flux;
      document.getElementById('theme-color-meta').content = dark ? th.dark : th.light;
    }
    function selectTheme(id) {
      applyTheme(id);
      save();
      renderThemeSwatches();
    }
    function toggleThemePicker() {
      themePickerOpen = !themePickerOpen;
      document.getElementById('theme-popover').classList.toggle('open', themePickerOpen);
      if (themePickerOpen) renderThemeSwatches();
    }
    function renderThemeSwatches() {
      const names = t().themeNames;
      document.getElementById('theme-popover').innerHTML = Object.keys(THEMES).map(id => `
        <button class="theme-swatch${currentTheme === id ? ' active' : ''}" onclick="selectTheme('${id}')">
          <div class="swatch-circle" style="background:${SWATCH_BG[id]}"></div>
          <span class="swatch-label">${names[id]}</span>
        </button>`).join('');
    }

    // ── Priority ─────────────────────────────────────────────────────────────
    function cyclePriority() {
      const cycle = ['', 'high', 'medium', 'low'];
      newPriority = cycle[(cycle.indexOf(newPriority) + 1) % cycle.length];
      updatePriorityBtn();
    }
    function updatePriorityBtn() {
      const btn = document.getElementById('priority-btn');
      if (!btn) return;
      const T = t();
      const labels = { '': T.priorityNone, high: T.priorityHigh, medium: T.priorityMedium, low: T.priorityLow };
      btn.textContent = labels[newPriority] ?? T.priorityNone;
      btn.dataset.p = newPriority;
    }
    function cycleTodoPriority(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const cycle = ['', 'high', 'medium', 'low'];
      todo.priority = cycle[(cycle.indexOf(todo.priority || '') + 1) % cycle.length];
      save(); render();
    }

    // ── Changelog ────────────────────────────────────────────────────────────
    function openChangelog() {
      const T = t();
      document.getElementById('changelog-heading').textContent = T.changelogHeading;
      document.getElementById('changelog-body').innerHTML = T.changelogVersions.map((v, i) => `
        <div class="changelog-version"${i > 0 ? ' style="margin-top:18px"' : ''}>
          <span class="changelog-tag">${v.version}</span>
          ${v.date ? `<span class="changelog-date">${v.date}</span>` : ''}
        </div>
        <ul class="changelog-list">
          ${v.entries.map(e => `<li>${e}</li>`).join('')}
        </ul>
      `).join('');
      document.getElementById('changelog-backdrop').classList.add('show');
      document.addEventListener('keydown', onEscClose);
    }
    function closeChangelog() {
      document.getElementById('changelog-backdrop').classList.remove('show');
      document.removeEventListener('keydown', onEscClose);
    }
    function handleBackdropClick(e) {
      if (e.target === e.currentTarget) closeChangelog();
    }
    function onEscClose(e) { if (e.key === 'Escape') closeChangelog(); }

    // ── Utilities ────────────────────────────────────────────────────────────
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function handleKey(e) { if (e.key === 'Enter') addTodo(); }

    // ── Render ───────────────────────────────────────────────────────────────
    function render() {
      const T = t();

      document.getElementById('app-title').textContent = T.appTitle;
      document.title = T.appTitle;
      document.getElementById('app-claim').textContent = T.claim;
      document.getElementById('header-badges').innerHTML = T.headerBadges.map(b => `<span class="header-badge">${b}</span>`).join('');
      document.getElementById('new-todo-input').placeholder = T.placeholder;
      updatePriorityBtn();
      document.getElementById('new-todo-note').placeholder = T.notePlaceholder;
      document.getElementById('history-title').textContent = T.historyTitle;
      document.getElementById('io-title').textContent = T.ioTitle;
      document.getElementById('export-label').textContent = T.exportLabel;
      document.getElementById('import-label').textContent = T.importLabel;
      document.getElementById('clear-label').textContent = T.clearLabel;

      const filterLabels = [T.filterOpen, T.filterDone];
      document.querySelectorAll('.filter-btn').forEach((b, i) => { b.textContent = filterLabels[i]; });
      const searchInput = document.getElementById('search-input');
      if (searchInput) searchInput.placeholder = T.searchPlaceholder;

      // Stats + progress
      const doneCount = todos.filter(t => t.done).length;
      const total = todos.length;
      const pct = total ? Math.round((doneCount / total) * 100) : 0;
      const statsRow = document.getElementById('stats-row');
      if (total) {
        statsRow.innerHTML = `
          <div class="stats-row">
            <button class="clear-all-btn" onclick="clearAllTodos()">${T.clearAllBtn}</button>
            <div style="display:flex;align-items:center;gap:10px">
              <span class="stats-text">${T.stats(doneCount, total)}</span>
              <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            </div>
          </div>`;
      } else {
        statsRow.innerHTML = '';
      }

      // Todo list
      const prioLabel = { high: T.priorityHigh, medium: T.priorityMedium, low: T.priorityLow };
      const dueLabel = { 'due-overdue': T.metaOverdue, 'due-today': T.metaDueToday, 'due-future': T.metaDue };
      const list = document.getElementById('todo-list');
      const visible = filteredTodos();
      if (!visible.length) {
        list.innerHTML = `<div class="empty-state">${SVG.inbox}<p>${T.emptyTodos}</p></div>`;
      } else {
        list.innerHTML = visible.map(todo => {
          const dc = todo.dueDate && !todo.done ? getDueClass(todo.dueDate) : '';
          return `
          <div class="todo-item${todo.done ? ' done' : ''}${dc === 'due-overdue' ? ' overdue' : ''}" data-id="${todo.id}"
               draggable="true"
               ondragstart="onDragStart(event,${todo.id})"
               ondragend="onDragEnd(event)"
               ondragover="onDragOver(event,${todo.id})"
               ondrop="onDrop(event,${todo.id})">
            <span class="drag-handle">${SVG.grip}</span>
            <label class="checkbox-wrap">
              <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${todo.id})" />
              <span class="checkbox-box"><span class="checkbox-check">${SVG.check}</span></span>
            </label>
            <span class="prio-badge" data-p="${todo.priority||''}" onclick="cycleTodoPriority(${todo.id})">${prioLabel[todo.priority] || '+'}</span>
            <div class="todo-text-wrap">
              <div class="todo-text">${escHtml(todo.text)}</div>
              <div class="todo-meta">${
                todo.done && todo.completedAt
                  ? T.metaDone + ': ' + formatDate(todo.completedAt)
                  : T.metaCreated + ': ' + formatShortDate(todo.created)
              }</div>
              ${todo.note ? `<div class="todo-note">${escHtml(todo.note)}</div>` : ''}
              ${dc ? `<div class="todo-due ${dc}">${dueLabel[dc]}: ${formatDueDate(todo.dueDate)}</div>` : ''}
            </div>
            <div class="todo-actions">
              <button class="action-btn" title="${T.editTitle}" onclick="startEdit(${todo.id})">${SVG.edit}</button>
              <button class="action-btn danger" title="${T.deleteTitle}" onclick="deleteTodo(${todo.id})">${SVG.trash}</button>
            </div>
          </div>`;
        }).join('');
      }

      // History
      const hList = document.getElementById('history-list');
      if (!history.length) {
        hList.innerHTML = `<div class="history-empty">${T.emptyHistory}</div>`;
      } else {
        const dotClass = { done:'h-dot-done', created:'h-dot-created', deleted:'h-dot-deleted', undone:'h-dot-undone' };
        const labelMap = { done: T.badgeDone, created: T.badgeCreated, deleted: T.badgeDeleted, undone: T.badgeUndone };
        hList.innerHTML = history.map(h => `
          <div class="history-item">
            <span class="h-dot ${dotClass[h.type] || ''}"></span>
            <span class="h-label">${labelMap[h.type] || h.type}</span>
            <span class="h-text">${escHtml(h.text)}</span>
            <span class="h-time">${formatDate(h.ts)}</span>
          </div>`).join('');
      }
      const hUsage = document.getElementById('history-usage');
      if (history.length) {
        const hPct = Math.min(Math.round((history.length / 10000) * 100), 100);
        hUsage.innerHTML = `
          <div class="stats-row" style="margin-top:8px;justify-content:flex-end">
            <div style="display:flex;align-items:center;gap:10px">
              <span class="stats-text">${T.historyUsage(history.length.toLocaleString())}</span>
              <div class="progress-bar"><div class="progress-fill" style="width:${hPct}%;background:${hPct > 80 ? 'var(--danger)' : 'var(--accent)'}"></div></div>
            </div>
          </div>`;
      } else {
        hUsage.innerHTML = '';
      }
    }

    // ── iOS Install Banner ────────────────────────────────────────────────────
    function setupIOSBanner() {
      const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isSafari = /safari/i.test(navigator.userAgent) && !/chrome|crios|fxios/i.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true;
      const dismissed = localStorage.getItem('flux_ios_banner_dismissed');
      if (!isIOS || !isSafari || isStandalone || dismissed) return;
      const banner = document.getElementById('ios-banner');
      const T = t();
      document.getElementById('ios-banner-title').textContent = T.iosBannerTitle;
      document.getElementById('ios-banner-hint').innerHTML = T.iosBannerHint;
      banner.style.display = 'flex';
    }
    function dismissIOSBanner() {
      localStorage.setItem('flux_ios_banner_dismissed', '1');
      const banner = document.getElementById('ios-banner');
      banner.style.transition = 'opacity 0.25s, transform 0.25s';
      banner.style.opacity = '0';
      banner.style.transform = 'translateY(16px)';
      setTimeout(() => banner.style.display = 'none', 260);
    }

    // ── PWA Setup ────────────────────────────────────────────────────────────
    function setupPWA() {
      const canvas = document.createElement('canvas');
      canvas.width = 192; canvas.height = 192;
      const ctx = canvas.getContext('2d');
      const r = 42;
      ctx.fillStyle = '#3d5afe';
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(192-r, 0);
      ctx.quadraticCurveTo(192, 0, 192, r);
      ctx.lineTo(192, 192-r);
      ctx.quadraticCurveTo(192, 192, 192-r, 192);
      ctx.lineTo(r, 192);
      ctx.quadraticCurveTo(0, 192, 0, 192-r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'white'; ctx.lineWidth = 16;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(45, 96); ctx.lineTo(80, 132); ctx.lineTo(147, 60);
      ctx.stroke();
      const iconUrl = canvas.toDataURL('image/png');
      const touchIcon = document.createElement('link');
      touchIcon.rel = 'apple-touch-icon';
      touchIcon.href = iconUrl;
      document.head.appendChild(touchIcon);
      try {
        const manifest = { name: 'Flux — Deine ToDo App', short_name: 'Flux',
          start_url: '.', display: 'standalone',
          background_color: '#7eb3ff', theme_color: '#3d5afe',
          icons: [{ src: iconUrl, sizes: '192x192', type: 'image/png' }] };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const mlink = document.createElement('link');
        mlink.rel = 'manifest'; mlink.href = URL.createObjectURL(blob);
        document.head.appendChild(mlink);
      } catch(e) {}
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    load();
    applyDark();
    applyTheme(currentTheme);
    applyLang();
    setupPWA();
    setupIOSBanner();
    render();
    document.addEventListener('click', function(e) {
      if (!themePickerOpen) return;
      const wrap = document.getElementById('theme-picker-wrap');
      if (wrap && !wrap.contains(e.target)) {
        themePickerOpen = false;
        document.getElementById('theme-popover').classList.remove('open');
      }
    });
  </script>
</body>
</html>
