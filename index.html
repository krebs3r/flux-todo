  <title>Flux — Deine ToDo App</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%233d5afe'/%3E%3Cpolyline points='7,16 13,22 25,10' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: linear-gradient(to bottom, #a0c4ff 0%, #c89eff 50%, #f0a8d8 100%);
      --bg-dark: linear-gradient(to bottom, #0c1648 0%, #1a1050 50%, #160832 100%);
      --surface: #ffffff;
      --surface-dark: #13172a;
      --text: #0f1623;
      --text-dark: #e8eaf6;
      --muted: #5a6480;
      --muted-dark: #9baad0;
      --accent: #3d5afe;
      --accent-hover: #2a47e6;
      --accent-muted: rgba(61,90,254,0.12);
      --accent-muted-dark: rgba(61,90,254,0.22);
      --danger: #e53935;
      --danger-muted: rgba(229,57,53,0.10);
      /* Glass tokens */
      --gl:            rgba(255,255,255,0.22);
      --gl-dark:       rgba(12,16,52,0.50);
      --gl-strong:     rgba(255,255,255,0.32);
      --gl-strong-dark:rgba(255,255,255,0.09);
      --gl-subtle:     rgba(255,255,255,0.12);
      --gl-subtle-dark:rgba(255,255,255,0.05);
      --gl-border:     rgba(255,255,255,0.50);
      --gl-border-dark:rgba(255,255,255,0.10);
      --gl-shadow:     0 8px 32px rgba(100,80,200,0.20), 0 1px 0 rgba(255,255,255,0.60) inset;
      --gl-shadow-dark:0 8px 32px rgba(0,0,0,0.50),     0 1px 0 rgba(255,255,255,0.06) inset;
      --shadow-sm: 0 2px 8px rgba(100,80,200,0.12);
      --shadow: var(--gl-shadow);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html {
      min-height: 100%;
      background-color: #a0c4ff;
      background-image: var(--bg);
      background-size: cover;
      background-attachment: fixed;
      overscroll-behavior-y: contain;
      transition: background-color 0.5s, background-image 0.5s;
    }
    html.dark {
      background-color: #0c1648;
      background-image: var(--bg-dark);
      background-size: cover;
    }

    /* ── Theme presets ───────────────────────────────────────── */
    html.theme-ocean { background-color: #6dd5ed; --bg: linear-gradient(to bottom, #6dd5ed 0%, #48cae4 50%, #90e0ef 100%); }
    html.dark.theme-ocean { background-color: #041530; --bg-dark: linear-gradient(to bottom, #041530 0%, #082040 50%, #0a2a52 100%); }
    html.theme-sunset { background-color: #ffd166; --bg: linear-gradient(to bottom, #ffd166 0%, #f4a26a 50%, #f08060 100%); }
    html.dark.theme-sunset { background-color: #2e1206; --bg-dark: linear-gradient(to bottom, #2e1206 0%, #3d1a0a 50%, #4a2210 100%); }
    html.theme-forest { background-color: #74c69d; --bg: linear-gradient(to bottom, #74c69d 0%, #52b788 50%, #95d5b2 100%); }
    html.dark.theme-forest { background-color: #152b20; --bg-dark: linear-gradient(to bottom, #152b20 0%, #1a3828 50%, #1e4030 100%); }
    html.theme-rose { background-color: #ffb3c6; --bg: linear-gradient(to bottom, #ffb3c6 0%, #f892aa 50%, #ffc8d6 100%); }
    html.dark.theme-rose { background-color: #2a0e1a; --bg-dark: linear-gradient(to bottom, #2a0e1a 0%, #381422 50%, #421828 100%); }
    html.theme-mono { background-color: #c5c9d0; --bg: linear-gradient(to bottom, #d1d5db 0%, #b8bec8 50%, #e2e5ea 100%); }
    html.dark.theme-mono { background-color: #141618; --bg-dark: linear-gradient(to bottom, #141618 0%, #1c1e22 50%, #22252a 100%); }
    html.theme-bender { background-color: #b8c8e0; --bg: linear-gradient(to bottom, #b8c8e0 0%, #9ab4d4 50%, #ccdaea 100%); }
    html.dark.theme-bender { background-color: #0e1828; --bg-dark: linear-gradient(to bottom, #0e1828 0%, #142030 50%, #182638 100%); }
    html.theme-lumpi { background-color: #e2d0b8; --bg: linear-gradient(to bottom, #e2d0b8 0%, #d4bc9e 50%, #ecdec8 100%); }
    html.dark.theme-lumpi { background-color: #1c100a; --bg-dark: linear-gradient(to bottom, #1c100a 0%, #24160e 50%, #2c1c12 100%); }
    html.theme-nobler { background-color: #d0d0d8; --bg: linear-gradient(to bottom, #d0d0d8 0%, #bcbcc8 50%, #e0e0e8 100%); }
    html.dark.theme-nobler { background-color: #10101a; --bg-dark: linear-gradient(to bottom, #10101a 0%, #16161e 50%, #1c1c26 100%); }

    /* ── Theme Picker ────────────────────────────────────────── */
    .theme-picker-wrap { position: relative; }
    .theme-popover {
      display: none;
      position: absolute; right: 0; top: calc(100% + 8px);
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid var(--gl-border); border-radius: var(--radius);
      box-shadow: var(--gl-shadow); padding: 10px; min-width: 196px;
      z-index: 100;
    }
    .theme-popover.open { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    body.dark .theme-popover { background: rgba(12,16,52,0.88); border-color: var(--gl-border-dark); box-shadow: var(--gl-shadow-dark); }
    .theme-swatch {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 6px 4px; border-radius: 8px; border: none; background: transparent;
      transition: background 0.15s;
    }
    .theme-swatch:hover { background: rgba(255,255,255,0.40); }
    body.dark .theme-swatch:hover { background: rgba(255,255,255,0.09); }
    .theme-swatch.active { background: var(--accent-muted); outline: 2px solid var(--accent); outline-offset: 1px; }
    body.dark .theme-swatch.active { background: var(--accent-muted-dark); }
    .swatch-circle { width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.6); flex-shrink: 0; }
    .swatch-label { font-size: 10px; font-weight: 600; color: var(--text); opacity: 0.8; white-space: nowrap; }
    body.dark .swatch-label { color: var(--text-dark); }

    body {
      font-family: -apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      background: transparent;
      padding: 32px 16px 64px;
      padding-top: max(32px, calc(env(safe-area-inset-top) + 16px));
      padding-bottom: max(64px, calc(env(safe-area-inset-bottom) + 32px));
      padding-left: max(16px, env(safe-area-inset-left));
      padding-right: max(16px, env(safe-area-inset-right));
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 660px; margin: 0 auto; }

    /* ── Pull to Refresh ──────────────────────────────────── */
    .pull-indicator {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 0;
      overflow: visible;
      z-index: 9999;
      pointer-events: none;
    }
    .pull-indicator .pull-spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(-50px) scale(0.6);
      transition: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .dark .pull-indicator .pull-spinner {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }
    .pull-indicator .pull-arrow {
      width: 18px;
      height: 18px;
      transition: transform 0.2s;
    }
    .pull-indicator.refreshing .pull-spinner {
      animation: pull-spin 0.8s linear infinite;
    }
    @keyframes pull-spin {
      to { transform: translateY(24px) rotate(360deg); }
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 14px 16px;
      background: var(--gl);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      border: 1px solid var(--gl-border);
      border-radius: var(--radius);
      box-shadow: var(--gl-shadow);
      position: relative;
      z-index: 10;
    }
    body.dark .header {
      background: var(--gl-dark);
      border-color: var(--gl-border-dark);
      box-shadow: var(--gl-shadow-dark);
    }
    .header-left {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .header-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.95);
      flex-shrink: 0;
      box-shadow: 0 4px 18px rgba(100,80,200,0.28), 0 1px 0 rgba(255,255,255,0.60) inset;
    }
    body.dark .header-icon {
      background: rgba(100,80,220,0.30);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 4px 18px rgba(0,0,0,0.40), 0 1px 0 rgba(255,255,255,0.12) inset;
    }
    .header h1 {
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      transition: color 0.4s;
      line-height: 1.2;
    }
    body.dark .header h1 { color: var(--text-dark); }
    .header-claim {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.01em;
      margin-top: 1px;
    }
    body.dark .header-claim { color: var(--muted-dark); }
    .header-badges {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      flex-wrap: wrap;
    }
    .header-badge {
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.50);
      color: var(--muted);
      background: rgba(255,255,255,0.28);
    }
    body.dark .header-badge {
      border-color: rgba(255,255,255,0.12);
      color: var(--muted-dark);
      background: rgba(255,255,255,0.07);
    }

    .header-controls { display: flex; gap: 6px; align-items: center; margin-top: 2px; }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      height: 32px;
      background: var(--gl-strong);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--gl-border);
      color: var(--muted);
      border-radius: var(--radius-sm);
      padding: 0 10px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }
    body.dark .ctrl-btn {
      background: var(--gl-strong-dark);
      border-color: var(--gl-border-dark);
      color: var(--muted-dark);
    }
    .ctrl-btn:hover {
      background: rgba(255,255,255,0.50);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
    }
    body.dark .ctrl-btn:hover {
      background: rgba(255,255,255,0.14);
      box-shadow: 0 0 0 3px var(--accent-muted-dark);
    }
    .ctrl-btn svg { flex-shrink: 0; }

    /* ── Card ───────────────────────────────────────────────── */
    .card {
      background: var(--gl);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--gl-border);
      border-radius: var(--radius);
      box-shadow: var(--gl-shadow);
      padding: 20px 24px;
      margin-bottom: 12px;
    }
    body.dark .card {
      background: var(--gl-dark);
      border-color: var(--gl-border-dark);
      box-shadow: var(--gl-shadow-dark);
    }

    /* ── Add Row ────────────────────────────────────────────── */
    .add-row { display: flex; gap: 8px; }

    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .add-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
      background: rgba(255,255,255,0.42);
    }
    body.dark .add-row input {
      background: rgba(255,255,255,0.07);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
    }
    body.dark .add-row input:focus { background: rgba(255,255,255,0.11); }
    .add-row input::placeholder { color: var(--muted); }
    body.dark .add-row input::placeholder { color: var(--muted-dark); }

    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      height: 44px;
      margin-top: 10px;
      background: rgba(255,255,255,0.20);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.02em;
      border: 1px solid var(--gl-border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-add:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(255,255,255,0.38);
    }
    .btn-add:active { border-color: var(--accent); color: var(--accent); }
    body.dark .btn-add {
      background: rgba(255,255,255,0.06);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
    }
    body.dark .btn-add:hover { background: rgba(255,255,255,0.11); }

    /* ── Priority ───────────────────────────────────────────── */
    .priority-cycle-btn {
      height: 40px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      letter-spacing: 0.04em;
      white-space: nowrap;
      min-width: 74px;
    }
    body.dark .priority-cycle-btn {
      background: rgba(255,255,255,0.07);
      border-color: var(--gl-border-dark);
      color: var(--muted-dark);
    }
    .priority-cycle-btn[data-p="high"]   { background: rgba(229,57,53,0.12); border-color: rgba(229,57,53,0.40); color: #e53935; }
    .priority-cycle-btn[data-p="medium"] { background: rgba(245,124,0,0.12);  border-color: rgba(245,124,0,0.40);  color: #e65100; }
    .priority-cycle-btn[data-p="low"]    { background: rgba(56,142,60,0.12);  border-color: rgba(56,142,60,0.40);  color: #2e7d32; }
    body.dark .priority-cycle-btn[data-p="high"]   { background: rgba(229,57,53,0.20);  color: #ef5350; }
    body.dark .priority-cycle-btn[data-p="medium"] { background: rgba(245,124,0,0.20);  color: #f57c00; }
    body.dark .priority-cycle-btn[data-p="low"]    { background: rgba(56,142,60,0.20);  color: #66bb6a; }
    .prio-badge {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, filter 0.15s;
    }
    .prio-badge:hover { filter: brightness(0.9); }
    .prio-badge[data-p="high"]   { background: rgba(229,57,53,0.12); border-color: rgba(229,57,53,0.30); color: #c62828; }
    .prio-badge[data-p="medium"] { background: rgba(245,124,0,0.12);  border-color: rgba(245,124,0,0.30);  color: #bf360c; }
    .prio-badge[data-p="low"]    { background: rgba(56,142,60,0.12);  border-color: rgba(56,142,60,0.30);  color: #1b5e20; }
    .prio-badge[data-p=""]       { background: rgba(90,100,128,0.10); border-color: rgba(90,100,128,0.18); color: var(--muted); min-width: 28px; min-height: 28px; display: inline-flex; align-items: center; justify-content: center; }
    body.dark .prio-badge[data-p="high"]   { background: rgba(229,57,53,0.20); color: #ef5350; }
    body.dark .prio-badge[data-p="medium"] { background: rgba(245,124,0,0.20); color: #f57c00; }
    body.dark .prio-badge[data-p="low"]    { background: rgba(56,142,60,0.20); color: #66bb6a; }
    body.dark .prio-badge[data-p=""] { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); color: var(--muted-dark); }
    .todo-note {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    body.dark .todo-note { color: var(--muted-dark); }
    .note-input {
      width: 100%;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.20);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      resize: none;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .note-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
      background: rgba(255,255,255,0.35);
    }
    body.dark .note-input {
      background: rgba(255,255,255,0.05);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
    }
    body.dark .note-input:focus { background: rgba(255,255,255,0.09); }
    .note-input::placeholder { color: var(--muted); }
    body.dark .note-input::placeholder { color: var(--muted-dark); }
    .note-edit-input {
      width: 100%;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--accent);
      background: rgba(255,255,255,0.45);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      resize: none;
      line-height: 1.5;
      box-shadow: 0 0 0 3px var(--accent-muted);
    }
    body.dark .note-edit-input {
      background: rgba(255,255,255,0.08);
      color: var(--text-dark);
    }

    /* ── Due Date ────────────────────────────────────────────── */
    .due-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .due-input-icon { color: var(--muted); display: flex; flex-shrink: 0; }
    body.dark .due-input-icon { color: var(--muted-dark); }
    .due-input {
      flex: 1;
      padding: 10px 14px;
      height: 44px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .due-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-muted);
    }
    body.dark .due-input {
      background: rgba(255,255,255,0.05);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
      color-scheme: dark;
    }
    .due-input::-webkit-calendar-picker-indicator { opacity: 0; width: 100%; position: absolute; cursor: pointer; }
    .due-edit-input::-webkit-calendar-picker-indicator { opacity: 0; width: 100%; position: absolute; cursor: pointer; }
    .due-input.due-time { flex: 0 1 auto; width: 110px; }
    .todo-due {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .todo-due.due-future  { background: rgba(90,100,128,0.10); border-color: rgba(90,100,128,0.18); color: var(--muted); }
    .todo-due.due-today   { background: rgba(245,124,0,0.12); border-color: rgba(245,124,0,0.30); color: #e65100; }
    .todo-due.due-overdue { background: rgba(229,57,53,0.12); border-color: rgba(229,57,53,0.30); color: #c62828; }
    body.dark .todo-due.due-future  { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); color: var(--muted-dark); }
    body.dark .todo-due.due-today   { background: rgba(245,124,0,0.20); border-color: rgba(245,124,0,0.30); color: #ffb74d; }
    body.dark .todo-due.due-overdue { background: rgba(229,57,53,0.20); border-color: rgba(229,57,53,0.30); color: #ef5350; }
    .todo-item.overdue { box-shadow: inset 3px 0 0 var(--danger); }
    .due-edit-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .due-edit-input {
      flex: 1;
      min-width: 0;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--accent);
      background: rgba(255,255,255,0.25);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-muted);
      color-scheme: light;
    }
    .due-edit-input.due-time { flex: 0 0 auto; width: 110px; }
    body.dark .due-edit-input {
      background: rgba(255,255,255,0.08);
      color: var(--text-dark);
      color-scheme: dark;
    }
    .edit-btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .edit-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: var(--gl);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .edit-btn:hover { background: rgba(255,255,255,0.45); color: var(--text); }
    .edit-btn.edit-save { background: var(--accent); color: #fff; border-color: var(--accent); }
    .edit-btn.edit-save:hover { background: var(--accent-hover); }
    body.dark .edit-btn { background: var(--gl-dark); border-color: var(--gl-border-dark); color: var(--muted-dark); }
    body.dark .edit-btn:hover { background: rgba(255,255,255,0.12); color: var(--text-dark); }
    body.dark .edit-btn.edit-save { background: var(--accent); color: #fff; border-color: var(--accent); }
    body.dark .edit-btn.edit-save:hover { background: var(--accent-hover); }

    /* ── Search ─────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      display: flex;
    }
    body.dark .search-icon { color: var(--muted-dark); }
    .search-input {
      width: 100%;
      padding: 10px 36px 10px 36px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.30);
      background: var(--gl-subtle);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    body.dark .search-input {
      background: var(--gl-subtle-dark);
      border-color: rgba(255,255,255,0.07);
      color: var(--text-dark);
    }
    .search-input::placeholder { color: var(--muted); }
    body.dark .search-input::placeholder { color: var(--muted-dark); }
    .search-input:focus {
      border-color: var(--accent);
      background: rgba(255,255,255,0.28);
    }
    body.dark .search-input:focus {
      background: rgba(255,255,255,0.08);
    }
    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      display: none;
    }
    .search-clear.visible { display: block; }
    .search-clear:hover { color: var(--text); }
    body.dark .search-clear:hover { color: var(--text-dark); }

    /* ── Filters ────────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      background: var(--gl-subtle);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: var(--radius-sm);
      padding: 3px;
    }
    body.dark .filters {
      background: var(--gl-subtle-dark);
      border-color: rgba(255,255,255,0.07);
    }
    .filter-btn {
      flex: 1;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: all 0.15s;
    }
    body.dark .filter-btn { color: var(--muted-dark); }
    .filter-btn.active {
      background: rgba(255,255,255,0.55);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    body.dark .filter-btn.active {
      background: rgba(255,255,255,0.13);
      color: var(--text-dark);
    }

    /* ── Todo List ──────────────────────────────────────────── */
    .todo-list { display: flex; flex-direction: column; gap: 1px; }

    /* ── Swipe container ───────────────────────────────── */
    .swipe-wrap {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-sm);
    }
    .swipe-action {
      position: absolute;
      top: 0; bottom: 0;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .swipe-action.left {
      left: 0;
      background: #6bcb77;
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
    }
    .swipe-action.right {
      right: 0;
      justify-content: flex-end;
      background: #ff6b6b;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .swipe-action.visible { opacity: 1; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 12px;
      border-radius: var(--radius-sm);
      background: transparent;
      cursor: default;
      transition: background 0.15s, transform 0.15s;
      user-select: none;
      position: relative;
      will-change: transform;
    }
    .todo-item:hover { background: rgba(255,255,255,0.28); }
    body.dark .todo-item:hover { background: rgba(255,255,255,0.07); }
    .todo-item.dragging { opacity: 0.35; cursor: grabbing; }
    .todo-item.drag-over {
      background: var(--accent-muted);
      outline: 1px solid var(--accent);
      outline-offset: -1px;
      border-radius: var(--radius-sm);
    }
    body.dark .todo-item.drag-over { background: var(--accent-muted-dark); }

    .drag-handle {
      color: rgba(255,255,255,0.35);
      flex-shrink: 0;
      cursor: grab;
      display: flex;
      align-items: center;
      transition: color 0.15s;
      margin-top: 2px;
    }
    .todo-item:hover .drag-handle { color: var(--muted); }
    body.dark .drag-handle { color: rgba(255,255,255,0.15); }
    body.dark .todo-item:hover .drag-handle { color: var(--muted-dark); }

    /* Custom checkbox */
    .checkbox-wrap {
      position: relative;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      cursor: pointer;
      margin-top: 2px;
    }
    .checkbox-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .checkbox-box {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.30);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    body.dark .checkbox-box { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
    .checkbox-wrap:hover .checkbox-box { border-color: var(--accent); }
    .checkbox-wrap input:checked ~ .checkbox-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkbox-check {
      display: none;
      color: #fff;
    }
    .checkbox-wrap input:checked ~ .checkbox-box .checkbox-check { display: block; }

    .todo-content { flex: 1; min-width: 0; }
    .todo-text-wrap { display: flex; flex-direction: column; gap: 4px; }
    .todo-text {
      font-size: 0.9rem;
      color: var(--text);
      word-break: break-word;
      line-height: 1.45;
      transition: color 0.2s;
    }
    body.dark .todo-text { color: var(--text-dark); }
    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    body.dark .todo-item.done .todo-text { color: var(--muted-dark); }

    .todo-meta {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.01em;
    }
    body.dark .todo-meta { color: var(--muted-dark); }

    .todo-bottom-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      margin-top: 4px;
    }
    .todo-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
      width: 100%;
    }
    .todo-actions .prio-badge { margin-right: auto; }
    .todo-item:hover .todo-actions { opacity: 1; }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .action-btn:hover { background: rgba(255,255,255,0.42); color: var(--accent); }
    .action-btn.danger:hover { background: var(--danger-muted); color: var(--danger); }
    body.dark .action-btn:hover { background: rgba(255,255,255,0.10); color: var(--accent); }
    body.dark .action-btn.danger:hover { background: rgba(229,57,53,0.15); color: #ef5350; }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.35);
      margin: 8px 0;
    }
    body.dark .divider { background: rgba(255,255,255,0.08); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 32px 0 20px;
      color: var(--muted);
    }
    body.dark .empty-state { color: var(--muted-dark); }
    .empty-state svg { opacity: 0.35; }
    .empty-state p { font-size: 0.88rem; }

    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.35);
    }
    body.dark .stats-row { border-color: rgba(255,255,255,0.08); }
    .stats-text {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    body.dark .stats-text { color: var(--muted-dark); }
    .progress-bar {
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.30);
      border-radius: 2px;
      overflow: hidden;
    }
    body.dark .progress-bar { background: rgba(255,255,255,0.10); }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Section Header ─────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-icon {
      color: var(--muted);
      display: flex;
      align-items: center;
    }
    body.dark .section-icon { color: var(--muted-dark); }
    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    body.dark .section-title { color: var(--muted-dark); }

    /* ── History ────────────────────────────────────────────── */
    .history-list { display: flex; flex-direction: column; gap: 1px; }

    .history-item {
      display: grid;
      grid-template-columns: 8px auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
    }
    .history-item:hover { background: rgba(255,255,255,0.28); }
    body.dark .history-item:hover { background: rgba(255,255,255,0.07); }

    .h-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .h-dot-done    { background: #43a047; }
    .h-dot-created { background: var(--accent); }
    .h-dot-deleted { background: var(--danger); }
    .h-dot-undone  { background: #fb8c00; }

    .h-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
      color: var(--muted);
      min-width: 68px;
    }
    body.dark .h-label { color: var(--muted-dark); }

    .h-text {
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
    }
    body.dark .h-text { color: var(--text-dark); }

    .h-time {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    body.dark .h-time { color: var(--muted-dark); }

    .history-empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 0;
      font-size: 0.85rem;
    }
    body.dark .history-empty { color: var(--muted-dark); }

    /* ── IO Buttons ─────────────────────────────────────────── */
    .io-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .io-btn {
      flex: 1;
      min-width: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--gl-border);
      background: rgba(255,255,255,0.20);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: all 0.15s;
    }
    body.dark .io-btn {
      background: rgba(255,255,255,0.06);
      border-color: var(--gl-border-dark);
      color: var(--text-dark);
    }
    .io-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.38); }
    body.dark .io-btn:hover { background: rgba(255,255,255,0.11); }
    .io-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-muted); }
    body.dark .io-btn.danger:hover { background: rgba(229,57,53,0.12); border-color: var(--danger); }
    .io-btn svg { flex-shrink: 0; }

    #import-file { display: none; }

    /* ── Inline Edit ────────────────────────────────────────── */
    .todo-edit-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--accent);
      background: rgba(255,255,255,0.55);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-muted);
    }
    body.dark .todo-edit-input {
      background: rgba(255,255,255,0.10);
      color: var(--text-dark);
    }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(255,255,255,0.30);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.50);
      color: var(--text);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      pointer-events: none;
      white-space: nowrap;
      box-shadow: var(--gl-shadow);
    }
    body.dark .toast {
      background: rgba(12,16,52,0.65);
      border-color: rgba(255,255,255,0.10);
      color: var(--text-dark);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .clear-all-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 2px 0;
      letter-spacing: 0.02em;
      transition: color 0.15s;
      text-decoration: underline;
      text-decoration-color: transparent;
      text-underline-offset: 2px;
    }
    .clear-all-btn:hover {
      color: var(--danger);
      text-decoration-color: var(--danger);
    }
    body.dark .clear-all-btn { color: var(--muted-dark); }
    body.dark .clear-all-btn:hover { color: #ef5350; text-decoration-color: #ef5350; }

    .section-header { cursor: pointer; }
    .section-header:hover .section-title { color: var(--text); }
    body.dark .section-header:hover .section-title { color: var(--text-dark); }
    .chevron {
      margin-left: auto;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: transform 0.22s ease;
    }
    body.dark .chevron { color: var(--muted-dark); }
    .section-header.open .chevron { transform: rotate(180deg); }
    .collapsible {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease;
    }
    .collapsible.open { grid-template-rows: 1fr; }
    .collapsible-inner { overflow: hidden; }

    .footer {
      text-align: center;
      margin-top: 8px;
      padding-bottom: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .footer span {
      font-size: 0.7rem;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .footer span:hover {
      color: rgba(0,0,0,0.55);
      border-color: rgba(0,0,0,0.3);
    }
    body.dark .footer span { color: rgba(255,255,255,0.45); }
    body.dark .footer span:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.5); }
    .footer-github {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      color: rgba(0,0,0,0.30);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }
    .footer-github:hover { color: rgba(0,0,0,0.50); }
    body.dark .footer-github { color: rgba(255,255,255,0.35); }
    body.dark .footer-github:hover { color: rgba(255,255,255,0.75); }

    /* ── iOS Install Banner ─────────────────────────────────── */
    .ios-banner {
      position: fixed;
      bottom: max(16px, calc(env(safe-area-inset-bottom) + 12px));
      left: 16px; right: 16px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(61,90,254,0.18), 0 1px 0 rgba(255,255,255,0.7) inset;
      padding: 14px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 3000;
      animation: bannerIn 0.35s cubic-bezier(.22,1,.36,1);
    }
    body.dark .ios-banner {
      background: rgba(12,16,52,0.78);
      border-color: rgba(255,255,255,0.10);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.06) inset;
    }
    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ios-banner-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ios-banner-icon {
      width: 36px; height: 36px;
      background: #3d5afe;
      border-radius: 9px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .ios-banner-icon svg { width: 20px; height: 20px; }
    .ios-banner-text {
      flex: 1;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    body.dark .ios-banner-text { color: var(--text-dark); }
    .ios-banner-close {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1.1rem; line-height: 1;
      padding: 4px; border-radius: 50%;
      flex-shrink: 0;
    }
    .ios-banner-close:hover { color: var(--text); }
    body.dark .ios-banner-close:hover { color: var(--text-dark); }
    .ios-banner-hint {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.45;
      padding-left: 46px;
    }
    body.dark .ios-banner-hint { color: var(--muted-dark); }
    .ios-banner-arrow {
      text-align: center;
      font-size: 1.3rem;
      color: #3d5afe;
      line-height: 1;
      margin-top: 2px;
      animation: arrowBounce 1.2s ease-in-out infinite;
    }
    @keyframes arrowBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(4px); }
    }

    /* ── Confirm Modal ──────────────────────────────────────── */
    .confirm-modal { max-width: 360px; }
    .confirm-body { padding: 24px 22px 20px; }
    .confirm-message {
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 20px;
    }
    body.dark .confirm-message { color: var(--text-dark); }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .confirm-btn {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.40);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .confirm-no {
      background: rgba(255,255,255,0.25);
      color: var(--text);
    }
    body.dark .confirm-no {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.10);
      color: var(--text-dark);
    }
    .confirm-no:hover { background: rgba(255,255,255,0.42); }
    body.dark .confirm-no:hover { background: rgba(255,255,255,0.12); }
    .confirm-yes {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .confirm-yes:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .confirm-yes.danger {
      background: var(--danger);
      border-color: var(--danger);
    }
    .confirm-yes.danger:hover { background: #c62828; border-color: #c62828; }

    /* ── Changelog Modal ────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: all; }
    .modal {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.70);
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(100,80,200,0.30), 0 1px 0 rgba(255,255,255,0.60) inset;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(16px) scale(0.98);
      transition: transform 0.22s ease;
    }
    body.dark .modal {
      background: rgba(12,16,52,0.65);
      border-color: rgba(255,255,255,0.10);
      box-shadow: 0 24px 64px rgba(0,0,0,0.60), 0 1px 0 rgba(255,255,255,0.06) inset;
    }
    .modal-backdrop.show .modal { transform: translateY(0) scale(1); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.30);
    }
    body.dark .modal-header { border-color: rgba(255,255,255,0.08); }
    .modal-header h2 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    body.dark .modal-header h2 { color: var(--text-dark); }
    .modal-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.38); color: var(--text); }
    body.dark .modal-close:hover { background: rgba(255,255,255,0.10); color: var(--text-dark); }
    .modal-body { padding: 20px 22px 24px; }
    .changelog-version {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .changelog-tag {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--accent-muted);
      color: var(--accent);
    }
    body.dark .changelog-tag { background: var(--accent-muted-dark); }
    .changelog-date {
      font-size: 0.75rem;
      color: var(--muted);
    }
    body.dark .changelog-date { color: var(--muted-dark); }
    .changelog-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .changelog-list li {
      display: flex;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.5;
    }
    body.dark .changelog-list li { color: var(--text-dark); }
    .changelog-list li::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* ── Pomodoro Timer ─────────────────────────────────────── */
    .pomo-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.30);
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
      z-index: 4000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: max(24px, calc(env(safe-area-inset-top) + 16px));
      padding-bottom: max(24px, calc(env(safe-area-inset-bottom) + 16px));
      animation: pomoFadeIn 0.3s ease;
    }
    body.dark .pomo-overlay { background: rgba(0,0,0,0.55); }
    @keyframes pomoFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .pomo-card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 24px;
      box-shadow: 0 24px 64px rgba(100,80,200,0.20), 0 1px 0 rgba(255,255,255,0.60) inset;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    body.dark .pomo-card {
      background: rgba(12,16,52,0.55);
      border-color: rgba(255,255,255,0.10);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.06) inset;
    }
    .pomo-minimize {
      position: absolute;
      top: max(16px, calc(env(safe-area-inset-top) + 8px));
      right: 16px;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .pomo-minimize:hover { background: rgba(255,255,255,0.65); border-color: rgba(0,0,0,0.15); }
    body.dark .pomo-minimize { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.10); color: var(--muted-dark); }
    body.dark .pomo-minimize:hover { background: rgba(255,255,255,0.15); }
    .pomo-phase {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 4px 14px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .pomo-phase.work {
      background: var(--accent-muted);
      color: var(--accent);
    }
    body.dark .pomo-phase.work { background: var(--accent-muted-dark); }
    .pomo-phase.break {
      background: rgba(56,142,60,0.12);
      color: #2e7d32;
    }
    body.dark .pomo-phase.break {
      background: rgba(56,142,60,0.20);
      color: #66bb6a;
    }
    .pomo-task-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 16px;
      opacity: 0.75;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.dark .pomo-task-name { color: var(--text-dark); }
    .pomo-time-big {
      font-size: 4.5rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      letter-spacing: -2px;
      margin: 24px 0;
      line-height: 1;
    }
    body.dark .pomo-time-big { color: var(--text-dark); }
    .pomo-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .pomo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      border: 1px solid rgba(0,0,0,0.10);
      transition: background 0.2s, border-color 0.2s;
    }
    body.dark .pomo-dot { background: rgba(255,255,255,0.20); border-color: rgba(255,255,255,0.15); }
    .pomo-dot.filled { background: var(--accent); }
    .pomo-controls {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 32px;
    }
    .pomo-btn-big {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .pomo-btn-big:hover { background: var(--accent-hover); }
    .pomo-btn-big:active { transform: scale(0.95); }
    .pomo-btn-big.danger {
      background: var(--danger-muted);
      color: var(--danger);
    }
    .pomo-btn-big.danger:hover { background: var(--danger); color: #fff; }
    body.dark .pomo-btn-big.danger { background: rgba(229,57,53,0.15); }
    body.dark .pomo-btn-big.danger:hover { background: var(--danger); color: #fff; }
    /* Minimized floating button */
    .pomo-mini {
      position: fixed;
      bottom: max(16px, calc(env(safe-area-inset-bottom) + 12px));
      right: 16px;
      height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: 22px;
      background: var(--accent);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2000;
      box-shadow: 0 4px 20px rgba(61,90,254,0.35);
      transition: background 0.15s;
      animation: bannerIn 0.35s cubic-bezier(.22,1,.36,1);
    }
    .pomo-mini:hover { background: var(--accent-hover); }
    .action-btn.pomo-active { color: var(--accent); }

    /* ── Touch devices: always show actions & handles ───────── */
    @media (hover: none) and (pointer: coarse) {
      /* Actions always visible — no hover on touch */
      .todo-actions { opacity: 1; gap: 6px; }
      .action-btn {
        background: rgba(255,255,255,0.18);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: var(--radius-sm);
      }
      body.dark .action-btn {
        background: rgba(255,255,255,0.06);
        border-color: rgba(255,255,255,0.10);
      }
      /* Drag handle always visible */
      .drag-handle { color: rgba(255,255,255,0.45); }
      body.dark .drag-handle { color: rgba(255,255,255,0.25); }
      /* Prio badge: larger touch target */
      .prio-badge { min-width: 44px; min-height: 44px; padding: 6px 10px; font-size: 0.68rem; }
      .prio-badge[data-p=""] { min-width: 44px; min-height: 44px; }
      /* Active state feedback (replaces hover) */
      .btn-add:active        { border-color: var(--accent); color: var(--accent); }
      .ctrl-btn:active       { background: rgba(255,255,255,0.50); color: var(--accent); }
      body.dark .ctrl-btn:active { background: rgba(255,255,255,0.18); }
      .filter-btn:active     { background: rgba(255,255,255,0.40); }
      body.dark .filter-btn:active { background: rgba(255,255,255,0.12); }
      .action-btn:active     { background: rgba(255,255,255,0.42); color: var(--accent); }
      .action-btn.danger:active { background: var(--danger-muted); color: var(--danger); }
      .io-btn:active         { border-color: var(--accent); color: var(--accent); }
      .todo-item:active      { background: rgba(255,255,255,0.22); }
      body.dark .todo-item:active { background: rgba(255,255,255,0.07); }
      .pomo-btn-big:active { background: var(--accent-hover); transform: scale(0.95); }
      .pomo-btn-big.danger:active { background: var(--danger); color: #fff; }
      .pomo-minimize:active { background: rgba(255,255,255,0.35); }
    }

    /* ── Mobile layout ───────────────────────────────────────── */
    @media (max-width: 640px) {
      body {
        padding: 16px 12px 56px;
        padding-top: max(16px, calc(env(safe-area-inset-top) + 12px));
        padding-bottom: max(56px, calc(env(safe-area-inset-bottom) + 24px));
        padding-left: max(12px, env(safe-area-inset-left));
        padding-right: max(12px, env(safe-area-inset-right));
      }
      .card { padding: 14px 16px; }

      /* Header controls: 44px touch targets */
      .ctrl-btn { height: 44px; padding: 0 13px; }

      /* Add row: 44px buttons */
      .btn-add { height: 48px; }
      .priority-cycle-btn { height: 44px; min-width: 80px; }

      /* Checkbox: larger tap area via padding trick */
      .checkbox-wrap { padding: 11px; margin: -11px; }

      /* Todo items: more breathing room */
      .todo-item { padding: 14px 10px; gap: 10px; }

      /* Action buttons: 44px tap targets */
      .action-btn { width: 44px; height: 44px; }

      /* Filter buttons: 44px min height */
      .filter-btn { padding: 11px 12px; font-size: 0.85rem; }

      /* Search: larger tap area for clear button */
      .search-clear { padding: 10px 8px; right: 2px; font-size: 1rem; }

      /* IO buttons: 44px */
      .io-btn { padding: 13px 14px; }

      /* Section header: larger tap target */
      .section-header { padding: 6px 0; cursor: pointer; }

      /* History items: easier to read */
      .history-item { padding: 12px; }

      .header { flex-wrap: wrap; padding: 16px; gap: 14px; }
      .header-left { flex: 1 1 100%; gap: 14px; }
      .header-controls { margin-left: auto; gap: 8px; }
      .header h1 { font-size: 1.1rem; }
      .header-badges { gap: 6px; margin-top: 6px; }
      .pomo-card { padding: 40px 24px; }
      .pomo-time-big { font-size: 3.5rem; }
      .pomo-mini { right: 12px; }
    }
  </style>
</head>
<body>
  <div class="pull-indicator" id="pull-indicator">
    <div class="pull-spinner">
      <svg class="pull-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <polyline points="19 12 12 19 5 12"></polyline>
      </svg>
    </div>
  </div>
  <div class="app">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-icon">
          <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
            <polyline points="7,16 13,22 25,10" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1 id="app-title">Flux — Deine ToDo App</h1>
          <div class="header-claim" id="app-claim"></div>
          <div class="header-badges" id="header-badges"></div>
        </div>
      </div>
      <div class="header-controls">
        <button class="ctrl-btn" id="lang-btn" onclick="toggleLang()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span id="lang-label">EN</span>
        </button>
        <div class="theme-picker-wrap" id="theme-picker-wrap">
          <button class="ctrl-btn" id="theme-btn" onclick="toggleThemePicker()" title="Theme">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
          </button>
          <div class="theme-popover" id="theme-popover"></div>
        </div>
        <button class="ctrl-btn" id="notify-btn" onclick="toggleNotify()" title="Notifications">
          <span id="notify-icon"></span>
        </button>
        <button class="ctrl-btn" id="dark-btn" onclick="toggleDark()">
          <span id="dark-icon"></span>
        </button>
      </div>
    </div>

    <!-- Add Todo -->
    <div class="card">
      <div class="section-header">
        <span class="section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
        <span class="section-title" id="add-title"></span>
      </div>
      <div class="add-row">
        <input type="text" id="new-todo-input" maxlength="200" onkeydown="handleKey(event)" />
        <button class="priority-cycle-btn" id="priority-btn" data-p="" onclick="cyclePriority()"></button>
      </div>
      <textarea class="note-input" id="new-todo-note" rows="2"></textarea>
      <div class="due-input-row">
        <span class="due-input-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <input class="due-input" type="date" id="new-todo-due" />
        <span class="due-input-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        <input class="due-input due-time" type="time" id="new-todo-time" />
      </div>
      <button class="btn-add" id="add-btn" onclick="addTodo()" title="Hinzufügen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span id="add-btn-label"></span>
      </button>
    </div>

    <!-- Todo List -->
    <div class="card">
      <div class="section-header">
        <span class="section-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
        <span class="section-title" id="tasks-title"></span>
      </div>

    const t = () => i18n[lang];

    // ── Persistence ──────────────────────────────────────────────────────────
    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
      localStorage.setItem('history', JSON.stringify(history));
      localStorage.setItem('lang', lang);
      localStorage.setItem('dark', dark ? '1' : '0');
      localStorage.setItem('theme', currentTheme);
      localStorage.setItem('notify', notifyEnabled ? '1' : '0');
    }
    function load() {
      try { todos = JSON.parse(localStorage.getItem('todos')) || []; } catch { todos = []; }
      try { history = JSON.parse(localStorage.getItem('history')) || []; } catch { history = []; }
      lang = localStorage.getItem('lang') || 'de';
      const savedDark = localStorage.getItem('dark');
      dark = savedDark !== null ? savedDark === '1' : true;
      currentTheme = localStorage.getItem('theme') || 'flux';
      notifyEnabled = localStorage.getItem('notify') === '1' && 'Notification' in window && Notification.permission === 'granted';
    }

    // ── History helpers ──────────────────────────────────────────────────────
    function addHistory(type, text) {
      history.unshift({ type, text, ts: Date.now() });
      if (history.length > 10000) history.pop();
    }
    function formatDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function formatShortDate(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    function getDueClass(dueDate) {
      const now = new Date();
      const today = now.toISOString().split('T')[0];
      const dateOnly = dueDate.split('T')[0];
      if (dueDate.includes('T')) {
        const due = new Date(dueDate);
        if (due < now) return 'due-overdue';
        if (dateOnly === today) return 'due-today';
        return 'due-future';
      }
      if (dateOnly < today) return 'due-overdue';
      if (dateOnly === today) return 'due-today';
      return 'due-future';
    }
    function formatDueDate(dueDate) {
      if (!dueDate.includes('T')) return dueDate;
      const [d, tm] = dueDate.split('T');
      return d + ' · ' + tm;
    }

    // ── CRUD ─────────────────────────────────────────────────────────────────
    function addTodo() {
      const input = document.getElementById('new-todo-input');
      const text = input.value.trim();
      if (!text) return;
      const noteInput = document.getElementById('new-todo-note');
      const dueInput = document.getElementById('new-todo-due');
      const timeInput = document.getElementById('new-todo-time');
      const dueDate = dueInput.value ? (timeInput.value ? dueInput.value + 'T' + timeInput.value : dueInput.value) : '';
      todos.unshift({ id: Date.now(), text, done: false, created: Date.now(), priority: newPriority, note: noteInput.value.trim(), dueDate: dueDate });
      addHistory('created', text);
      input.value = '';
      noteInput.value = '';
      dueInput.value = '';
      timeInput.value = '';
      newPriority = '';
      updatePriorityBtn();
      haptic('success');
      save(); render();
    }
    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      todo.done = !todo.done;
      if (todo.done) { todo.completedAt = Date.now(); addHistory('done', todo.text); confetti(); }
      else { delete todo.completedAt; addHistory('undone', todo.text); }
      haptic('success');
      save(); render();
    }
    function deleteTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) addHistory('deleted', todo.text);
      todos = todos.filter(t => t.id !== id);
      haptic('warning');
      save(); render();
    }
    function startEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const wrap = document.querySelector(`[data-id="${id}"] .todo-text-wrap`);
      const oldText = todo.text;
      const oldNote = todo.note || '';
      const oldDue = todo.dueDate || '';
      const oldDueDate = oldDue.split('T')[0] || '';
      const oldDueTime = oldDue.includes('T') ? oldDue.split('T')[1] : '';
      const T = t();
      wrap.innerHTML = `
        <input class="todo-edit-input" value="${escHtml(oldText)}" maxlength="200" />
        <textarea class="note-edit-input" rows="2" maxlength="1000">${escHtml(oldNote)}</textarea>
        <div class="due-edit-row">
          <input class="due-edit-input" type="date" value="${oldDueDate}" />
          <input class="due-edit-input due-time" type="time" value="${oldDueTime}" />
        </div>
        <div class="edit-btn-row">
          <button class="edit-btn" id="edit-cancel-${id}">${T.editCancel}</button>
          <button class="edit-btn edit-save" id="edit-save-${id}">${T.editSave}</button>
        </div>
      `;
      const inp = wrap.querySelector('.todo-edit-input');
      const noteInp = wrap.querySelector('.note-edit-input');
      const dueDateInp = wrap.querySelector('.due-edit-input[type="date"]');
      const dueTimeInp = wrap.querySelector('.due-edit-input[type="time"]');
      noteInp.placeholder = T.notePlaceholder;
      inp.focus(); inp.select();
      function getEditDue() {
        const d = dueDateInp.value;
        if (!d) return '';
        const tm = dueTimeInp.value;
        return tm ? d + 'T' + tm : d;
      }
      inp.onkeydown = e => {
        if (e.key === 'Enter') { e.preventDefault(); noteInp.focus(); }
        if (e.key === 'Escape') commitEdit(id, oldText, oldText, oldNote, oldDue);
      };
      noteInp.onkeydown = e => {
        if (e.key === 'Escape') commitEdit(id, oldText, oldText, oldNote, oldDue);
      };
      document.getElementById('edit-save-' + id).onclick = () => {
        commitEdit(id, inp.value, oldText, noteInp.value, getEditDue());
      };
      document.getElementById('edit-cancel-' + id).onclick = () => {
        commitEdit(id, oldText, oldText, oldNote, oldDue);
      };
    }
    function commitEdit(id, newText, oldText, newNote, newDue) {
      newText = newText.trim();
      if (!newText) { render(); return; }
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const noteValue = newNote !== undefined ? newNote.trim() : (todo.note || '');
      const dueValue = newDue !== undefined ? newDue : (todo.dueDate || '');
      if (newText === oldText && noteValue === (todo.note || '') && dueValue === (todo.dueDate || '')) { render(); return; }
      todo.text = newText;
      todo.note = noteValue;
      todo.dueDate = dueValue;
      save(); render();
    }

    // ── Filter ───────────────────────────────────────────────────────────────
    function setFilter(f) {
      haptic('light');
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === f));
      render();
    }
    function filteredTodos() {
      let result = todos;
      if (currentFilter === 'open') result = result.filter(t => !t.done);
      else if (currentFilter === 'done') result = result.filter(t => t.done);
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        result = result.filter(t =>
          t.text.toLowerCase().includes(q) || (t.note && t.note.toLowerCase().includes(q))
        );
      }
      return result;
    }
    function onSearch(val) {
      searchQuery = val.trim();
      document.getElementById('search-clear').classList.toggle('visible', searchQuery.length > 0);
      render();
    }
    function clearSearch() {
      searchQuery = '';
      const inp = document.getElementById('search-input');
      if (inp) inp.value = '';
      document.getElementById('search-clear').classList.remove('visible');
      render();
    }

    // ── Drag & Drop ──────────────────────────────────────────────────────────
    function onDragStart(e, id) {
      dragSrcIndex = todos.findIndex(t => t.id === id);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => e.target.classList.add('dragging'), 0);
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
    }
    function onDragOver(e, id) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.todo-item').forEach(el => el.classList.remove('drag-over'));
      const el = document.querySelector(`[data-id="${id}"]`);
      if (el) el.classList.add('drag-over');
    }
    function onDrop(e, id) {
      e.preventDefault();
      const targetIndex = todos.findIndex(t => t.id === id);
      if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
      const [moved] = todos.splice(dragSrcIndex, 1);
      todos.splice(targetIndex, 0, moved);
      dragSrcIndex = null;
      save(); render();
    }

    // ── Import / Export ──────────────────────────────────────────────────────
    function exportData() {
      const blob = new Blob([JSON.stringify({ todos, history, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `tasks-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      showToast(t().toastExported);
    }
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data.todos)) throw new Error();
          todos = data.todos; history = data.history || [];
          save(); render(); showToast(t().toastImported);
        } catch { showToast(t().toastInvalidFile); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
    let _confirmCb = null;
    function showConfirm(message, onYes, onNo, yesIsDanger) {
      const T = t();
      document.getElementById('confirm-message').textContent = message;
      document.getElementById('confirm-yes').textContent = T.btnYes;
      document.getElementById('confirm-no').textContent = T.btnNo;
      document.getElementById('confirm-yes').classList.toggle('danger', !!yesIsDanger);
      document.getElementById('confirm-backdrop').classList.add('show');
      _confirmCb = { onYes, onNo };
    }
    function resolveConfirm(answer) {
      document.getElementById('confirm-backdrop').classList.remove('show');
      const cb = _confirmCb; _confirmCb = null;
      if (answer && cb?.onYes) cb.onYes();
      else if (!answer && cb?.onNo) cb.onNo();
    }

    function clearAllTodos() {
      if (!todos.length) return;
      const T = t();

    // ── Haptic Feedback (Android only — iOS Safari has no Vibration API) ────
    function haptic(type) {
      if (!navigator.vibrate) return;
      switch (type) {
        case 'light':   navigator.vibrate(8); break;
        case 'medium':  navigator.vibrate(15); break;
        case 'success': navigator.vibrate([10, 40, 10]); break;
        case 'warning': navigator.vibrate([15, 30, 15, 30, 15]); break;
      }
